<!DOCTYPE html>
<html lang="zh-TW">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0"><!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍騰英文 暑假字彙練習 W1–W8</title>
<style>
:root {
  --navy:#1F4E79; --navyD:#163a5a;
  --low:#1F497D; --lowLt:#DDEEFF; --lowMd:#BDD7EE;
  --mid:#375623; --midLt:#E2EFDA; --midMd:#C6E0B4;
  --high:#7B3F00; --highLt:#FCE4D6; --highMd:#F8CBAD;
  --ok:#1B5E20; --okBg:#E8F5E9;
  --err:#B71C1C; --errBg:#FFEBEE;
  --exp:#F57F17; --expBg:#FFF8E1;
  --grey:#555; --greyLt:#F5F5F5; --border:#DDD;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;background:#EEF2F7;color:#222;font-size:15px;line-height:1.6}
header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:700;flex:1}
.badge{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:13px;white-space:nowrap}
.wrap{max-width:920px;margin:0 auto;padding:18px 14px 60px}

.week-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.wt{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:14px;font-weight:700;color:var(--grey);transition:all .18s}
.wt:hover{border-color:var(--navy);color:var(--navy)}
.wt.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.wt.done{border-color:var(--ok);color:var(--ok)}
.wt.done.active{background:var(--ok);color:#fff;border-color:var(--ok)}

.tier-bar{display:flex;gap:0;margin-bottom:18px;border-radius:var(--r);overflow:hidden;border:2px solid var(--border)}
.tb{flex:1;padding:10px 6px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all .18s;background:#fff;line-height:1.3}
.tb:not(:last-child){border-right:2px solid var(--border)}
.tb.low{color:var(--low)} .tb.mid{color:var(--mid)} .tb.high{color:var(--high)}
.tb.active.low{background:var(--low);color:#fff} .tb.active.mid{background:var(--mid);color:#fff} .tb.active.high{background:var(--high);color:#fff}
.td{display:block;font-weight:400;font-size:11px;opacity:.85;margin-top:2px}

.winfo{background:#fff;border-radius:var(--r);padding:11px 15px;margin-bottom:16px;border-left:4px solid var(--navy);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.wl{font-weight:700;color:var(--navy);font-size:15px}
.ws{font-size:13px;color:var(--grey)}

.sbar{background:#fff;border-radius:var(--r);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border:1px solid var(--border)}
.sn{font-size:26px;font-weight:900;color:var(--navy);line-height:1}
.sl{font-size:12px;color:var(--grey)}
.prog{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;min-width:60px}
.pf{height:100%;background:var(--navy);border-radius:4px;transition:width .35s}
.sub-btn{margin-left:auto;padding:9px 20px;border-radius:6px;border:none;background:var(--navy);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.sub-btn:hover{opacity:.88}

.ph{padding:8px 14px;border-radius:var(--r);margin:18px 0 10px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.ph.A{background:var(--lowMd);color:var(--low)} .ph.B{background:var(--midMd);color:var(--mid)} .ph.C{background:var(--highMd);color:var(--high)}

.qc{background:#fff;border-radius:var(--r);padding:16px 18px;margin-bottom:10px;border:1.5px solid var(--border);transition:border-color .2s}
.qc.correct{border-color:var(--ok)} .qc.wrong{border-color:var(--err)}
.qh{display:flex;gap:10px;align-items:flex-start;margin-bottom:11px}
.qn{background:var(--navy);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.qt{font-size:15px;flex:1}
.qtag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:auto;white-space:nowrap;align-self:flex-start}
.qtag.MC{background:#E3F2FD;color:#1565C0}
.qtag.FILL{background:#E0F2F1;color:#00695C}
.qtag.ROOT{background:#EDE7F6;color:#6A1B9A}
.qtag.CTX{background:#FFF3E0;color:#E65100}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
@media(max-width:520px){.opts{grid-template-columns:1fr}}
.ob{padding:8px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--greyLt);cursor:pointer;text-align:left;font-size:14px;transition:all .18s;color:#222;width:100%}
.ob:hover:not(:disabled){border-color:var(--navy);background:var(--lowLt)}
.ob.correct{background:var(--okBg);border-color:var(--ok);color:var(--ok);font-weight:700}
.ob.wrong{background:var(--errBg);border-color:var(--err);color:var(--err)}
.ob.reveal{background:var(--okBg);border-color:var(--ok);color:var(--ok)}
.ol{display:inline-block;width:20px;font-weight:700}

.fr{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.fi{flex:1;min-width:150px;padding:8px 11px;border-radius:6px;border:1.5px solid var(--border);font-size:15px;outline:none}
.fi:focus{border-color:var(--navy)}
.fi.correct{border-color:var(--ok);background:var(--okBg);color:var(--ok)}
.fi.wrong{border-color:var(--err);background:var(--errBg);color:var(--err)}
.fh{font-size:12px;color:var(--grey);margin-top:4px}
.hint-box{background:#F3F0FF;border-left:3px solid #7C4DFF;border-radius:0 6px 6px 0;padding:7px 12px;margin:8px 0 4px;font-size:13px}
.hint-blank{font-family:monospace;font-weight:700;color:#5E35B1;letter-spacing:1px}
.hint-sep{color:#999;margin:0 4px}
.hint-text{color:#444;font-style:italic}
.ck{padding:8px 16px;border-radius:6px;border:none;background:var(--navy);color:#fff;cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap}
.ck:disabled{opacity:.5;cursor:default}

.exp{background:var(--expBg);border-left:3px solid var(--exp);border-radius:0 6px 6px 0;padding:9px 13px;margin-top:10px;font-size:13px;color:#555;display:none;white-space:pre-line}
.exp.show{display:block}
.exl{font-weight:700;color:var(--exp);margin-right:4px}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.mo.show{display:flex}
.mb{background:#fff;border-radius:12px;padding:30px 24px;max-width:460px;width:100%;text-align:center}
.mb h2{font-size:20px;color:var(--navy);margin-bottom:6px}
.bsc{font-size:54px;font-weight:900;line-height:1.1;margin:10px 0}
.smsg{font-size:14px;color:var(--grey);margin-bottom:18px}
.mc-btn{padding:10px 26px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin:4px}
.mc-btn.sec{background:#fff;border:2px solid var(--navy);color:var(--navy)}
</style>
</head>
<body>
<header>
  <h1>🌞 龍騰英文　高一升高二暑假字彙練習</h1>
  <span class="badge">W1–W8 ∙ 每週 60 題 ∙ 三層分級</span>
</header>
<div class="wrap">
  <div class="week-tabs" id="wkTabs"></div>
  <div class="tier-bar">
    <button class="tb low active" onclick="setTier('low',this)">🔵 基礎鞏固型<span class="td">Low · 做 Part A（20題）</span></button>
    <button class="tb mid" onclick="setTier('mid',this)">🟢 穩健提升型<span class="td">Mid · 做 A+B（40題）</span></button>
    <button class="tb high" onclick="setTier('high',this)">🟠 全力衝刺型<span class="td">High · 做全部（60題）</span></button>
  </div>
  <div class="winfo" id="winfo"></div>
  <div class="sbar" id="sbar">
    <div><div class="sn" id="sn">0 / 0</div><div class="sl">已答對 / 已作答</div></div>
    <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
    <button class="sub-btn" onclick="showResult()">查看本週成績 →</button>
  </div>
  <div id="qa"></div>
</div>
<div class="mo" id="modal">
  <div class="mb">
    <h2>本週練習成果</h2>
    <div class="bsc" id="msc"></div>
    <div class="smsg" id="mmsg"></div>
    <button class="mc-btn" onclick="closeModal()">繼續複習</button>
    <button class="mc-btn sec" onclick="retryWrong()">只練錯題</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════
// QUIZ DATA — 8 weeks × 60 questions
// Part A: 20 MC  |  Part B: 20 FILL  |  Part C: 20 ROOT/CTX MC
// FILL format: question has blank encoded as x___y in stem
// Explanation always starts with 📖 full Chinese translation of stem
// ══════════════════════════════════════════════════════════════════════

const QDB = {

// ─────────────────────────────────────────────────────────────────────
// WEEK 1  B1 L1–L4 + Core Vocab L3 U01–U03
// ─────────────────────────────────────────────────────────────────────
w1:{week:1,dates:"7/1–7/6",srcA:"龍騰課本 B1 L1–L4",srcB:"核單 L4 U01",srcC:"核單 L4 U01 進階",
A:[
[1,"MC","The ______ ceremony left everyone in tears — truly unforgettable.",["systematic","balanced","focused","memorable"],3,null,"memorable (adj.) 難忘的。memory → memorable，令人難忘的場合。"],
[2,"MC","Maya accidentally ______ her sister's expensive vase and felt terrible about it.",["preserve","ruined","explain","deny"],1,null,"ruin (vt.) 破壞；毀壞。ruined = 毀壞了。"],
[3,"MC","After failing three exams in a row, the student felt so ______ that he stopped going to class and spent days in bed staring at the ceiling.",["reliable","systematic","depressed","disappointed"],2,null,"depressed (adj.) 沮喪的。de-（向下）+ press（壓）→ 情緒被向下壓。長時間臥床不起是 depressed 的典型症狀，而非 upset（短暫不安）。"],
[4,"MC","The bad news ______ Emma so much that she could not sleep all night.",["upset","adapt","remind","indicate"],0,null,"upset (vt.) 使難過。The news upset her."],
[5,"MC","He knocked over the teacher's coffee in front of the whole class — his face turned bright red and he could not bring himself to look up.",["pioneering","embarrassed","disappointed","constructive"],1,null,"embarrassed (adj.) 尷尬的。「臉紅、不敢抬頭」是尷尬的典型反應，而非 depressed（長期低落）或 inspired（受激勵）。"],
[6,"MC","Sara closed her eyes and tried to ______ where she had last seen her keys.",["create","alleviate","recall","ban"],2,null,"recall (vt.) 記起；回想起。re-（回）+ call（呼叫）→ 把記憶喚回。"],
[7,"MC","The old photo on the wall ______ him of happy childhood days in the countryside.",["alleviate","eliminate","simplify","reminded"],3,null,"remind sb. of sth. 使某人想起某事，固定搭配。"],
[8,"MC","After the failure, the young engineer sat quietly and tried to ______ on what had gone wrong.",["describe","warn","distinguish","reflect"],3,null,"reflect (vi.) 認真思考；沉思。re-（回）+ flect（彎）→ 把思緒折回。"],
[9,"MC","It took him years to ______ that consistent effort matters more than raw talent.",["highlight","realize","recall","blame"],1,null,"realize (vt.) 了解；領悟。re-（完全）+ alize → 使完全理解。"],
[10,"MC","The researcher gave an impressive ______ on climate change that moved the entire audience.",["minority","courage","presentation","strength"],2,null,"presentation (n.) 報告；介紹。present + -ation。"],
[11,"MC","Anna felt deeply ______ when none of her friends showed up at her birthday party.",["romantic","frustrated","satisfying","disappointed"],3,null,"disappointed (adj.) 感到失望的。dis-（相反）+ appointed（期待的）。"],
[12,"MC","Please ______ to my email as soon as possible — the deadline is tomorrow morning.",["fade","describe","respond","explore"],2,null,"respond (vi.) 回應。re-（回）+ spond（承諾）→ 回應。"],
[13,"MC","David tried to ______ the embarrassing incident, but people kept bringing it up.",["ignore","provide","condense","boost"],0,null,"ignore (vt.) 忽略。ig-（不）+ nore（知道）→ 假裝不知道。"],
[14,"MC","The passionate music teacher ______ her to compose her very first song at age ten.",["breathe","simplify","inspired","restore"],2,null,"inspire (vt.) 激勵；激發靈感。in-（向內）+ spir（呼吸）→ 向內吹入生命力。"],
[15,"MC","Despite all the noise around her, the student stayed completely ______ on finishing her essay.",["focused","satisfying","touched","open-minded"],0,null,"focus (vi./vt.) 專注。stay focused on = 持續專注於。"],
[16,"MC","The rescue team used GPS technology to ______ the survivors in the dense jungle.",["create","focus","require","locate"],3,null,"locate (vt.) 找到……的位置。locus（地點）→ 找到位置。"],
[17,"MC","Dogs have a ______ sense of smell that allows them to ______ illness before symptoms appear.",["hectic","keen / detect","scientific","promising"],1,null,"keen (adj.) 敏銳的；detect (vt.) 偵測到。兩者經常連用。"],
[18,"MC","After months of dedicated practice, Kate finally ______ her goal of finishing the marathon.",["breathe","accomplished","conquer","alleviate"],1,null,"accomplish (vt.) 達成；完成任務。ac-（趨向）+ complish（完成）。"],
[19,"MC","The professor ______ each student a different topic to research for the group project.",["assigned","preserve","ban","explain"],0,null,"assign (vt.) 指派；分配。as-（趨向）+ sign（標記）→ 指定到某處。"],
[20,"MC","Scientists use complex models to ______ the future spread of new infectious diseases.",["predict","fade","trace","explore"],0,null,"predict (vt.) 預測。pre-（之前）+ dict（說）→ 在事情發生前說出來。"]
],
B:[

[1,"FILL","The documentary was highly i_________e — every viewer left with a much deeper understanding of the topic than before.","informative",null,"i_________e|providing useful knowledge; educational; opposite of shallow or empty","📖 這部紀錄片非常有知識性——每位觀眾看完後對主題的理解都比以前深得多。\ninformative (a.) 有內容的；能增進知識的。an informative documentary = 有教育意義的紀錄片。"],
[2,"FILL","The new policy will i_______e every department — no team will be left unaffected by the changes.","involve",null,"i_______e|to include or affect; to require participation from; opposite of exclude","📖 新政策將涉及每個部門——沒有任何團隊不受這些變化的影響。\ninvolve (vt.) 使涉入；包含，需要。involve every department = 涉及每個部門。"],
[3,"FILL","The government introduced new measures to strengthen the e_______y and create more jobs for young people.","economy",null,"e_______y|the system of trade and money in a country; related to finance and production","📖 政府推出新措施以強化經濟並為年輕人創造更多就業機會。\neconomy (n.) 經濟；節省。strengthen the economy = 強化經濟，固定搭配。"],
[4,"FILL","The lawyer argued that without solid e_______e, the charges against her client could not be upheld in court.","evidence",null,"e_______e|facts or information showing whether something is true; proof; what a lawyer needs in court","📖 律師主張，若無確鑿證據，對其委託人的指控便無法在法庭上成立。\nevidence (n.) 證據（不可數）。solid evidence = 確鑿證據，固定搭配。"],
[5,"FILL","Many students choose to a_______e practical skills, such as coding and public speaking, outside the classroom.","acquire",null,"a_______e|to gain or obtain through effort or experience; to pick up a skill or knowledge","📖 許多學生選擇在課堂外習得實用技能，例如程式設計和公開演講。\nacquire (vt.) 獲得，習得。acquire skills = 習得技能，固定搭配。"],
[6,"FILL","The school trip was open to all students, i_________g those who had signed up at the last minute.","including",null,"i_________g|taking in as part of a group; not leaving out; used before examples of what is covered","📖 這次校外教學對所有學生開放，包括那些在最後一刻才報名的人。\nincluding (prep.) 包括。including those who... = 包括那些……的人。"],
[7,"FILL","A short walk in the park every afternoon helped r_______e the stress the graduate student had built up during long hours of studying.","relieve",null,"r_______e|to reduce or ease pain, stress, or difficulty; to make something less severe","📖 每天下午在公園短暫散步，有助於減輕她長時間讀書所積累的壓力。\nrelieve (vt.) 減輕；寬慰；解除。relieve stress = 減輕壓力，固定搭配。"],
[8,"FILL","The teenager became so a_______d to checking his phone every few minutes that he could not focus on anything for more than ten seconds.","addicted",null,"a_______d|unable to stop doing something because of habit; hooked on; opposite of free from","📖 他對每隔幾分鐘查看手機變得如此上癮，以致無法專注於任何事情超過十秒。\naddict (vt.) 使上癮（沈迷）。be addicted to = 對…上癮，固定搭配（過去分詞作形容詞）。"],
[9,"FILL","The new principal spoke with a_________y — every teacher in the room immediately understood that her decisions were final.","authority",null,"a_________y|the power or right to give orders and make decisions; confident command","📖 新校長說話充滿權威——房間裡的每位老師立刻明白她的決定是最終的。\nauthority (n.) 權威（力）；當局（複數）。speak with authority = 以權威口吻說話。"],
[10,"FILL","Regular exercise, i_________g both aerobic and strength training, is i_________e for understanding how the body adapts over time.","involving / informative",null,"i_________g / i_________e|including different types; educational about how the body works","📖 定期運動，包括有氧和力量訓練，對於了解身體如何隨時間適應非常有啟發性。\ninvolving (prep. 用法) 包含；informative (a.) 能增進知識的。兩字皆為本週核單。"],
[11,"FILL","The research provides strong e_______e that a balanced diet can significantly reduce the risk of chronic illness.","evidence",null,"e_______e|facts that support a conclusion; proof gathered through research or observation","📖 這項研究提供了有力證據，表明均衡飲食能顯著降低慢性病的風險。\nevidence (n.) 證據。provide evidence = 提供證據；strong evidence = 有力的證據。"],
[12,"FILL","Lin worked two part-time jobs to a_______e enough savings to study abroad for a full academic year.","acquire",null,"a_______e|to obtain through effort; to build up something through work or time","📖 她做了兩份兼職工作，以積攢足夠的積蓄，在海外讀一整個學年。\nacquire (vt.) 獲得。acquire savings = 積攢存款（此處取「獲得」義）。"],
[13,"FILL","The a_________y of the local health department ordered all restaurants to display their hygiene inspection scores publicly.","authority",null,"a_________y|an official organization with the power to make and enforce rules","📖 地方衛生局要求所有餐廳公開展示其衛生檢查分數。\nauthority (n.) 當局（此處用複數概念的單數形）。the authority ordered = 當局下令。"],
[14,"FILL","Playing video games for more than six hours a day can a_______t teenagers and interfere with sleep and schoolwork.","addict",null,"a_______t|to cause someone to become dependent on something through repeated use","📖 每天玩超過六小時的電玩可能使青少年上癮，並干擾睡眠和學業。\naddict (vt.) 使上癮（沈迷）。addict teenagers = 使青少年上癮。"],
[15,"FILL","The lecture was so i_________e that several students asked the professor for a reading list afterward.","informative",null,"i_________e|full of useful facts and knowledge; educational and worth listening to","📖 這堂課內容非常豐富，課後有幾位學生請教授提供閱讀書單。\ninformative (a.) 有內容的；能增進知識的。an informative lecture = 內容豐富的講課。"],
[16,"FILL","Yoga and meditation are known to r_______e anxiety and help people maintain a calm and focused state of mind.","relieve",null,"r_______e|to ease or lessen a negative feeling or condition; to bring relief from pressure","📖 瑜伽和冥想以能減輕焦慮並幫助人們保持平靜專注的心理狀態而聞名。\nrelieve (vt.) 減輕；寬慰。relieve anxiety = 減輕焦慮，固定搭配。"],
[17,"FILL","The project will i_______e collaboration between three departments and require everyone to adjust their schedules.","involve",null,"i_______e|to include and require participation from; to make necessary","📖 這個專案將涉及三個部門之間的合作，並需要所有人調整時間表。\ninvolve (vt.) 包含，需要。involve collaboration = 需要合作。"],

// ENGINE
// ══════════════════════════════════════════════════════════════════════
let curW='w1', curTier='low';
let state={};
const ALPHA=['A','B','C','D'];

function initState(wk){
  if(!state[wk]) state[wk]={A:{},B:{},C:{}};
}
function getQs(wk,tier){
  const d=QDB[wk];
  if(tier==='low') return [{part:'A',qs:d.A}];
  if(tier==='mid') return [{part:'A',qs:d.A},{part:'B',qs:d.B}];
  return [{part:'A',qs:d.A},{part:'B',qs:d.B},{part:'C',qs:d.C}];
}
function setTier(t,el){
  curTier=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function switchWeek(wk){
  curW=wk;
  document.querySelectorAll('.wt').forEach(b=>b.classList.remove('active'));
  document.getElementById('wt_'+wk).classList.add('active');
  render();
}

function render(){
  initState(curW);
  const d=QDB[curW];
  document.getElementById('winfo').innerHTML=
    `<span class="wl">第 ${d.week} 週　${d.dates}</span>`+
    `<span class="ws">📖 Part A：${d.srcA}</span>`+
    `<span class="ws">✏️ Part B：${d.srcB}</span>`+
    `<span class="ws">🔤 Part C：${d.srcC}</span>`;
  const groups=getQs(curW,curTier);
  const partLabel={A:'Part A　選擇題（Vocabulary in Context）',B:'Part B　填空題（Guided Fill-in）',C:'Part C　進階題（Word Formation & Context）'};
  let html='';
  groups.forEach(g=>{
    html+=`<div class="ph ${g.part}">📝 ${partLabel[g.part]}</div>`;
    g.qs.forEach((q,i)=>{
      const qid=`${curW}_${g.part}_${i}`;
      const st=state[curW][g.part][i]||{done:false,correct:false};
      const cls=st.done?(st.correct?'correct':'wrong'):'';
      const [id,type,stem,opts,ans,hint,expl]=q;
      const stemHtml = stem.replace(/\n/g,'<br>');
      if(type==='MC'||type==='ROOT'||type==='CTX'){
        const btns=opts.map((o,oi)=>{
          let bcls='ob';
          if(st.done){
            if(oi===ans) bcls+=' correct';
            else if(oi===st.chosen) bcls+=' wrong';
          }
          return `<button class="${bcls}" onclick="answerMC('${curW}','${g.part}',${i},${oi},${ans},'${qid}')" ${st.done?'disabled':''}><span class="ol">${ALPHA[oi]}.</span>${o}</button>`;
        }).join('');
        const expHtml=st.done?`<div class="exp show"><span class="exl">解析</span>${expl}</div>`:`<div class="exp"></div>`;
        html+=`<div class="qc ${cls}" id="${qid}">
          <div class="qh"><div class="qn">${i+1}</div><div class="qt">${stemHtml}</div><span class="qtag ${type}">${type}</span></div>
          <div class="opts">${btns}</div>${expHtml}</div>`;
      } else {
        const val=st.done?(st.correct?ans:(st.typed||'')):'';
        const fiCls=st.done?(st.correct?'correct':'wrong'):'';
        const expHtml=st.done?`<div class="exp show"><span class="exl">解析</span>${expl}</div>`:`<div class="exp"></div>`;
        const wrongAns=st.done&&!st.correct?`<div class="fh">✅ 正確答案：${ans}</div>`:'';
        let hintHtml='';
        if(hint){
          const hParts=hint.split('|');
          const hBlank=hParts[0];
          const hText=hParts.slice(1).join('|');
          hintHtml=`<div class="hint-box"><span class="hint-blank">${hBlank}</span><span class="hint-sep"> — </span><span class="hint-text">${hText}</span></div>`;
        }
        html+=`<div class="qc ${cls}" id="${qid}">
          <div class="qh"><div class="qn">${i+1}</div><div class="qt">${stemHtml}</div><span class="qtag FILL">FILL</span></div>
          ${hintHtml}
          <div class="fr">
            <input class="fi ${fiCls}" id="fi_${qid}" placeholder="輸入答案…" value="${val}" ${st.done?'disabled':''}
              onkeydown="if(event.key==='Enter')checkFill('${curW}','${g.part}',${i},'${qid}')">
            <button class="ck" id="ck_${qid}" onclick="checkFill('${curW}','${g.part}',${i},'${qid}')" ${st.done?'disabled':''}>確認</button>
          </div>${wrongAns}${expHtml}</div>`;
      }
    });
  });
  document.getElementById('qa').innerHTML=html;
  updateScore();
}

function answerMC(wk,part,idx,chosen,ans,qid){
  state[wk][part][idx]={done:true,correct:chosen===ans,chosen};
  render();
  setTimeout(()=>document.getElementById(qid)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function checkFill(wk,part,idx,qid){
  const inp=document.getElementById('fi_'+qid);
  if(!inp) return;
  const typed=inp.value.trim().toLowerCase();
  const ans=QDB[wk][part][idx][3].toLowerCase();
  state[wk][part][idx]={done:true,correct:typed===ans,typed:inp.value.trim()};
  render();
  setTimeout(()=>document.getElementById(qid)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function updateScore(){
  const groups=getQs(curW,curTier);
  let tot=0,cor=0,ans=0;
  groups.forEach(g=>{
    g.qs.forEach((_,i)=>{
      tot++;
      const s=state[curW]?.[g.part]?.[i];
      if(s?.done){ans++; if(s.correct) cor++;}
    });
  });

// ENGINE
// ══════════════════════════════════════════════════════════════════════
let curW='w1', curTier='low';
let state={};
const ALPHA=['A','B','C','D'];

function initState(wk){
  if(!state[wk]) state[wk]={A:{},B:{},C:{}};
}
function getQs(wk,tier){
  const d=QDB[wk];
  if(tier==='low') return [{part:'A',qs:d.A}];
  if(tier==='mid') return [{part:'A',qs:d.A},{part:'B',qs:d.B}];
  return [{part:'A',qs:d.A},{part:'B',qs:d.B},{part:'C',qs:d.C}];
}
function setTier(t,el){
  curTier=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function switchWeek(wk){
  curW=wk;
  document.querySelectorAll('.wt').forEach(b=>b.classList.remove('active'));
  document.getElementById('wt_'+wk).classList.add('active');
  render();
}

function render(){
  initState(curW);
  const d=QDB[curW];
  document.getElementById('winfo').innerHTML=
    `<span class="wl">第 ${d.week} 週　${d.dates}</span>`+
    `<span class="ws">📖 Part A：${d.srcA}</span>`+
    `<span class="ws">✏️ Part B：${d.srcB}</span>`+
    `<span class="ws">🔤 Part C：${d.srcC}</span>`;
  const groups=getQs(curW,curTier);
  const partLabel={A:'Part A　選擇題（Vocabulary in Context）',B:'Part B　填空題（Guided Fill-in）',C:'Part C　進階題（Word Formation & Context）'};
  let html='';
  groups.forEach(g=>{
    html+=`<div class="ph ${g.part}">📝 ${partLabel[g.part]}</div>`;
    g.qs.forEach((q,i)=>{
      const qid=`${curW}_${g.part}_${i}`;
      const st=state[curW][g.part][i]||{done:false,correct:false};
      const cls=st.done?(st.correct?'correct':'wrong'):'';
      const [id,type,stem,opts,ans,hint,expl]=q;
      const stemHtml = stem.replace(/\n/g,'<br>');
      if(type==='MC'||type==='ROOT'||type==='CTX'){
        const btns=opts.map((o,oi)=>{
          let bcls='ob';
          if(st.done){
            if(oi===ans) bcls+=' correct';
            else if(oi===st.chosen) bcls+=' wrong';
          }
          return `<button class="${bcls}" onclick="answerMC('${curW}','${g.part}',${i},${oi},${ans},'${qid}')" ${st.done?'disabled':''}><span class="ol">${ALPHA[oi]}.</span>${o}</button>`;
        }).join('');
        const expHtml=st.done?`<div class="exp show"><span class="exl">解析</span>${expl}</div>`:`<div class="exp"></div>`;
        html+=`<div class="qc ${cls}" id="${qid}">
          <div class="qh"><div class="qn">${i+1}</div><div class="qt">${stemHtml}</div><span class="qtag ${type}">${type}</span></div>
          <div class="opts">${btns}</div>${expHtml}</div>`;
      } else {
        const val=st.done?(st.correct?ans:(st.typed||'')):'';
        const fiCls=st.done?(st.correct?'correct':'wrong'):'';
        const expHtml=st.done?`<div class="exp show"><span class="exl">解析</span>${expl}</div>`:`<div class="exp"></div>`;
        const wrongAns=st.done&&!st.correct?`<div class="fh">✅ 正確答案：${ans}</div>`:'';
        let hintHtml='';
        if(hint){
          const hParts=hint.split('|');
          const hBlank=hParts[0];
          const hText=hParts.slice(1).join('|');
          hintHtml=`<div class="hint-box"><span class="hint-blank">${hBlank}</span><span class="hint-sep"> — </span><span class="hint-text">${hText}</span></div>`;
        }
        html+=`<div class="qc ${cls}" id="${qid}">
          <div class="qh"><div class="qn">${i+1}</div><div class="qt">${stemHtml}</div><span class="qtag FILL">FILL</span></div>
          ${hintHtml}
          <div class="fr">
            <input class="fi ${fiCls}" id="fi_${qid}" placeholder="輸入答案…" value="${val}" ${st.done?'disabled':''}
              onkeydown="if(event.key==='Enter')checkFill('${curW}','${g.part}',${i},'${qid}')">
            <button class="ck" id="ck_${qid}" onclick="checkFill('${curW}','${g.part}',${i},'${qid}')" ${st.done?'disabled':''}>確認</button>
          </div>${wrongAns}${expHtml}</div>`;
      }
    });
  });
  document.getElementById('qa').innerHTML=html;
  updateScore();
}

function answerMC(wk,part,idx,chosen,ans,qid){
  state[wk][part][idx]={done:true,correct:chosen===ans,chosen};
  render();
  setTimeout(()=>document.getElementById(qid)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function checkFill(wk,part,idx,qid){
  const inp=document.getElementById('fi_'+qid);
  if(!inp) return;
  const typed=inp.value.trim().toLowerCase();
  const ans=QDB[wk][part][idx][3].toLowerCase();
  state[wk][part][idx]={done:true,correct:typed===ans,typed:inp.value.trim()};
  render();
  setTimeout(()=>document.getElementById(qid)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
