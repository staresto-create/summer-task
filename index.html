<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍騰英文 暑假字彙練習 W1–W8</title>
<style>
:root {
  --navy:#1F4E79; --navyD:#163a5a;
  --low:#1F497D; --lowLt:#DDEEFF; --lowMd:#BDD7EE;
  --mid:#375623; --midLt:#E2EFDA; --midMd:#C6E0B4;
  --high:#7B3F00; --highLt:#FCE4D6; --highMd:#F8CBAD;
  --ok:#1B5E20; --okBg:#E8F5E9;
  --err:#B71C1C; --errBg:#FFEBEE;
  --exp:#F57F17; --expBg:#FFF8E1;
  --grey:#555; --greyLt:#F5F5F5; --border:#DDD;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;background:#EEF2F7;color:#222;font-size:15px;line-height:1.6}
header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:700;flex:1}
.badge{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:13px;white-space:nowrap}
.wrap{max-width:920px;margin:0 auto;padding:18px 14px 60px}

.week-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.wt{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:14px;font-weight:700;color:var(--grey);transition:all .18s}
.wt:hover{border-color:var(--navy);color:var(--navy)}
.wt.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.wt.done{border-color:var(--ok);color:var(--ok)}
.wt.done.active{background:var(--ok);color:#fff;border-color:var(--ok)}
.wt.bonus-tab{background:#FFF8E1;border-color:#F9A825;color:#F57F17;font-weight:800}
.wt.bonus-tab.active{background:#F9A825;color:#fff;border-color:#F57F17}

.tier-bar{display:flex;gap:0;margin-bottom:18px;border-radius:var(--r);overflow:hidden;border:2px solid var(--border)}
.tb{flex:1;padding:10px 6px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all .18s;background:#fff;line-height:1.3}
.tb:not(:last-child){border-right:2px solid var(--border)}
.tb.low{color:var(--low)} .tb.mid{color:var(--mid)} .tb.high{color:var(--high)}
.tb.active.low{background:var(--low);color:#fff} .tb.active.mid{background:var(--mid);color:#fff} .tb.active.high{background:var(--high);color:#fff}
.td{display:block;font-weight:400;font-size:11px;opacity:.85;margin-top:2px}

.winfo{background:#fff;border-radius:var(--r);padding:11px 15px;margin-bottom:16px;border-left:4px solid var(--navy);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.wl{font-weight:700;color:var(--navy);font-size:15px}
.ws{font-size:13px;color:var(--grey)}

.sbar{background:#fff;border-radius:var(--r);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border:1px solid var(--border)}
.sn{font-size:26px;font-weight:900;color:var(--navy);line-height:1}
.sl{font-size:12px;color:var(--grey)}
.prog{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;min-width:60px}
.pf{height:100%;background:var(--navy);border-radius:4px;transition:width .35s}
.sub-btn{margin-left:auto;padding:9px 20px;border-radius:6px;border:none;background:var(--navy);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.sub-btn:hover{opacity:.88}

.ph{padding:8px 14px;border-radius:var(--r);margin:18px 0 10px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.ph.A{background:var(--lowMd);color:var(--low)} .ph.B{background:var(--midMd);color:var(--mid)} .ph.C{background:var(--highMd);color:var(--high)}

.qc{background:#fff;border-radius:var(--r);padding:16px 18px;margin-bottom:10px;border:1.5px solid var(--border);transition:border-color .2s}
.qc.correct{border-color:var(--ok)} .qc.wrong{border-color:var(--err)}
.qh{display:flex;gap:10px;align-items:flex-start;margin-bottom:11px}
.qn{background:var(--navy);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.qt{font-size:15px;flex:1}
.qtag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:auto;white-space:nowrap;align-self:flex-start}
.qtag.MC{background:#E3F2FD;color:#1565C0}
.qtag.FILL{background:#E0F2F1;color:#00695C}
.qtag.ROOT{background:#EDE7F6;color:#6A1B9A}
.qtag.CTX{background:#FFF3E0;color:#E65100}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
@media(max-width:520px){.opts{grid-template-columns:1fr}}
.ob{padding:8px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--greyLt);cursor:pointer;text-align:left;font-size:14px;transition:all .18s;color:#222;width:100%}
.ob:hover:not(:disabled){border-color:var(--navy);background:var(--lowLt)}
.ob.correct{background:var(--okBg);border-color:var(--ok);color:var(--ok);font-weight:700}
.ob.wrong{background:var(--errBg);border-color:var(--err);color:var(--err)}
.ob.reveal{background:var(--okBg);border-color:var(--ok);color:var(--ok)}
.ol{display:inline-block;width:20px;font-weight:700}

.fr{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.fi{flex:1;min-width:150px;padding:8px 11px;border-radius:6px;border:1.5px solid var(--border);font-size:15px;outline:none}
.fi:focus{border-color:var(--navy)}
.fi.correct{border-color:var(--ok);background:var(--okBg);color:var(--ok)}
.fi.wrong{border-color:var(--err);background:var(--errBg);color:var(--err)}
.fh{font-size:12px;color:var(--grey);margin-top:4px}
.hint-box{background:#F3F0FF;border-left:3px solid #7C4DFF;border-radius:0 6px 6px 0;padding:7px 12px;margin:8px 0 4px;font-size:13px}
.hint-blank{font-family:monospace;font-weight:700;color:#5E35B1;letter-spacing:1px}
.hint-sep{color:#999;margin:0 4px}
.hint-text{color:#444;font-style:italic}
.ck{padding:8px 16px;border-radius:6px;border:none;background:var(--navy);color:#fff;cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap}
.ck:disabled{opacity:.5;cursor:default}

.exp{background:var(--expBg);border-left:3px solid var(--exp);border-radius:0 6px 6px 0;padding:9px 13px;margin-top:10px;font-size:13px;color:#555;display:none;white-space:pre-line}
.exp.show{display:block}
.exl{font-weight:700;color:var(--exp);margin-right:4px}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.mo.show{display:flex}
.mb{background:#fff;border-radius:12px;padding:30px 24px;max-width:460px;width:100%;text-align:center}
.mb h2{font-size:20px;color:var(--navy);margin-bottom:6px}
.bsc{font-size:54px;font-weight:900;line-height:1.1;margin:10px 0}
.smsg{font-size:14px;color:var(--grey);margin-bottom:18px}
.mc-btn{padding:10px 26px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin:4px}
.mc-btn.sec{background:#fff;border:2px solid var(--navy);color:var(--navy)}
</style>
</head>
<body>
<header>
  <h1>🌞 龍騰英文　高一升高二暑假字彙練習</h1>
  <span class="badge">W1–W8 ∙ 每週 60 題 ∙ 三層分級</span>
</header>
<div class="wrap">
  <div class="week-tabs" id="wkTabs"></div>
  <div class="tier-bar">
    <button class="tb low active" onclick="setTier('low',this)">🔵 基礎鞏固型<span class="td">Low · 做 Part A（20題）</span></button>
    <button class="tb mid" onclick="setTier('mid',this)">🟢 穩健提升型<span class="td">Mid · 做 A+B（40題）</span></button>
    <button class="tb high" onclick="setTier('high',this)">🟠 全力衝刺型<span class="td">High · 做全部（60題）</span></button>
  </div>
  <div class="winfo" id="winfo"></div>
  <div class="sbar" id="sbar">
    <div><div class="sn" id="sn">0 / 0</div><div class="sl">已答對 / 已作答</div></div>
    <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
    <button class="sub-btn" onclick="showResult()">查看本週成績 →</button>
  </div>
  <div id="qa"></div>
</div>
<div class="mo" id="modal">
  <div class="mb">
    <h2>本週練習成果</h2>
    <div class="bsc" id="msc"></div>
    <div class="smsg" id="mmsg"></div>
    <button class="mc-btn" onclick="closeModal()">繼續複習</button>
    <button class="mc-btn sec" onclick="retryWrong()">只練錯題</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════
// QUIZ DATA — 8 weeks × 60 questions
// Part A: 20 MC  |  Part B: 20 FILL  |  Part C: 20 ROOT/CTX MC
// FILL format: question has blank encoded as x___y in stem
// Explanation always starts with 📖 full Chinese translation of stem
// ══════════════════════════════════════════════════════════════════════

const QDB = {

// ─────────────────────────────────────────────────────────────────────
// WEEK 1  B1 L1–L4 + Core Vocab L3 U01–U03
// ─────────────────────────────────────────────────────────────────────
w1:{week:1,dates:"7/1–7/6",srcA:"龍騰課本 B1 L1–L4",srcB:"核單 L4 U01",srcC:"核單 L4 U01 進階",
A:[
[1,"MC","The graduation ceremony was so ______ that graduates say they will always remember exactly where they were sitting and what was said that day.",["unforgettable","memorable","impressive","remarkable"],1,null,"memorable (adj.) 令人難以忘懷的（特別值得記住的）。will always remember exactly where they were sitting = memorable（強調留存在記憶中）；unforgettable = 無法遺忘（程度更強，通常指負面或震驚的事）；impressive = 令人印象深刻（當下感受）；remarkable = 非凡出色（不特指記憶）。"],
[2,"MC","Maya accidentally knocked her sister's expensive vase off the shelf, and it shattered on the floor — completely ______.",["ruined","ignored","preserved","displayed"],0,null,"ruined (v.) 毀壞；徹底損壞。shattered on the floor = ruined；ignored = 被忽視；preserved = 被保存（反義）；displayed = 被展示。"],
[3,"MC","After failing three exams in a row, the student became so ______ that he stopped attending class and refused to get out of bed for an entire week.",["frustrated","embarrassed","relieved","depressed"],3,null,"depressed (adj.) 憂鬱的。refusing to get out of bed for a week 是憂鬱症典型症狀，遠比 frustrated（短暫受阻）或 embarrassed（尷尬）嚴重；relieved 為反義。"],
[4,"MC","The bad news ______ Emma so deeply that she tossed and turned all night, unable to fall asleep.",["inspired","impressed","disturbed","upset"],3,null,"upset (v.) 使難過；使心煩意亂。tossed and turned all night 表情緒上的痛苦；disturbed 偏向嚴重心理問題；inspired/impressed 為正面情緒，不符。"],
[5,"MC","He knocked over the teacher's coffee in front of the whole class — his face turned bright red and he could not bring himself to look up.",["depressed","frustrated","disappointed","embarrassed"],3,null,"embarrassed (adj.) 尷尬的。臉紅、不敢抬頭是尷尬的生理反應，而非 depressed（長期低落）或 frustrated（受阻）或 disappointed（失望）。"],
[6,"MC","Sara stood at the door and tried to ______ exactly where she had left her keys — she needed to replay the last hour in her mind, step by step.",["reflect","realize","recall","remind"],2,null,"recall (v.) 回想起（從記憶中取出具體細節）。replay the last hour step by step = recall（逐步回憶具體事件）；reflect = 沉思、反省（思考抽象問題）；realize = 突然意識到（頓悟）；remind 需接受詞 remind sb. of sth.，不能單獨使用。"],
[7,"MC","The old photo on the wall ______ him of the carefree summers he had spent in the countryside as a child, bringing a smile to his face.",["reminded","inspired","informed","assured"],0,null,"remind sb. of sth.（使某人想起某事）固定搭配。triggered memory of childhood = reminded；inspired = 激勵；informed = 告知；assured = 向…保證。"],
[8,"MC","After the project failed, the young engineer sat quietly for an hour, trying to ______ on what mistakes had led to such a poor outcome.",["describe","insist","reflect","comment"],2,null,"reflect on（反思；深思）固定搭配。trying to understand what went wrong = reflect；describe = 描述；insist on = 堅持；comment on = 評論。"],
[9,"MC","After watching his mentor fail dozens of times without giving up, he slowly began to ______ that resilience, not talent, is what separates those who succeed from those who do not.",["confirm","acknowledge","realize","determine"],1,null,"realize (v.) 逐漸意識到、領悟（從觀察中得出新的理解）。slowly began to understand through observation = realize（漸進式的領悟）；confirm = 確認已有的信念；acknowledge = 承認（公開表示，通常指對他人）；determine = 決定（主動選擇做某事）。"],
[10,"MC","The researcher prepared slides and charts for her ______ on climate change, and left time at the end for a Q&A session.",["lecture","speech","presentation","comment"],2,null,"presentation (n.) 簡報。slides + charts + Q&A = presentation 的典型要素；lecture = 課堂講課（單向）；speech = 演講（通常無視覺輔助）；comment = 評論（太短）。"],
[11,"MC","Anna had been looking forward to her birthday party for weeks, so she felt deeply ______ when not a single friend showed up.",["satisfied","embarrassed","disappointed","frustrated"],2,null,"disappointed (adj.) 感到失望的。期待後落空 = disappointed；satisfied = 滿意（反義）；embarrassed = 尷尬；frustrated = 沮喪受阻（原因不同）。"],
[12,"MC","Please ______ to my email at your earliest convenience — I need your formal confirmation before the deadline tomorrow morning.",["attend","respond","react","reply"],1,null,"respond (v.) 正式回應。formal confirmation = respond（正式商業用語）；reply 較口語；attend to = 處理（不接 email）；react to = 對…作出反應。"],
[13,"MC","David ______ the embarrassing incident whenever it came up — he would change the subject or pretend not to hear, hoping people would eventually forget.",["forget","avoid","ignore","dismiss"],2,null,"ignore (v.) 故意不理睬。pretended not to hear = ignore（刻意裝作沒聽到）；forget = 忘記（非刻意）；avoid = 迴避（行動上）；dismiss = 否定。"],
[14,"MC","The music teacher ______ her to write her very first song at the age of ten, sparking a lifelong passion for composing that she never lost.",["persuaded","encouraged","motivated","inspired"],3,null,"inspire (v.) 激發靈感。sparking a lifelong passion = inspired（創作靈感的觸發）；persuaded = 說服（邏輯說服）；encouraged = 鼓勵（支持，非靈感觸發）；motivated = 激勵（動力，非靈感）。"],
[15,"MC","Despite the noisy construction outside the window, the student kept her eyes fixed on a single paragraph and refused to look up until she had fully understood it — completely ______ on her reading.",["calm","determined","absorbed","focused"],3,null,"focused (adj.) 專注的（注意力集中在特定目標上）。kept eyes on a single paragraph until fully understood = focused on（目標導向的集中）；calm = 冷靜（情緒狀態）；determined = 下定決心（意志）；absorbed = 全神貫注（被吸引進去，偏被動），focused on 更強調主動將注意力鎖定在特定任務上。"],
[16,"MC","The rescue team used satellite technology to ______ the exact position of the survivors, who were trapped deep in the jungle with no way to signal for help.",["detect","locate","identify","trace"],1,null,"locate (v.) 找到…的位置。find the exact position = locate；detect = 偵測（存在與否）；identify = 辨認身份；trace = 追蹤來源。"],
[17,"MC","Dogs have such a ______ sense of smell that they can detect traces of chemicals at concentrations far beyond what any human instrument can measure.",["keen","sharp","strong","remarkable"],0,null,"keen (adj.) 敏銳的（感官）。a keen sense of smell = 靈敏的嗅覺（固定搭配）；sharp sense 也可，但 keen sense 更慣用；strong smell = 濃烈的氣味（描述氣味本身）；remarkable = 非凡（泛用）。"],
[18,"MC","After eighteen months of 5 a.m. training sessions, Kate finally ______ what she had set out to do: cross the finish line of a full 42-kilometer marathon without stopping.",["accomplished","achieved","fulfilled","reached"],0,null,"accomplish (v.) 達成（完成一項具體的任務或目標，強調努力後的完成）。cross the finish line of a specific goal after 18 months of training = accomplished（固定搭配 accomplish a goal / accomplish what one set out to do）；achieve 也常見；fulfill 更常用於 fulfill a dream/promise；reach 偏向到達某地或某數字。"],
[19,"MC","The professor ______ each student a unique research topic — no two students in the class were permitted to write about the same subject.",["gave","assigned","offered","suggested"],1,null,"assign (v.) 指派；分配（任務）。each student received a unique topic officially = assigned；gave 太口語；offered = 提供選擇（自願性）；suggested = 建議（非強制性）。"],
[20,"MC","Scientists use complex mathematical models to ______ the future spread of infectious diseases, helping governments prepare before outbreaks reach a critical stage.",["predict","estimate","calculate","determine"],0,null,"predict (v.) 預測（未來事件）。forecast future events using models = predict；estimate = 估計數量；calculate = 計算（數學運算）；determine = 確定（已知事實）。"]
],
B:[

[1,"FILL","The documentary was highly i_________e — every viewer left with a much deeper understanding of the topic than before.","informative",null,"i_________e|providing useful knowledge; educational; opposite of shallow or empty","📖 這部紀錄片非常有知識性——每位觀眾看完後對主題的理解都比以前深得多。\ninformative (a.) 有內容的；能增進知識的。an informative documentary = 有教育意義的紀錄片。"],
[2,"FILL","The new policy will i_______e every department — no team will be left unaffected by the changes.","involve",null,"i_______e|to include or affect; to require participation from; opposite of exclude","📖 新政策將涉及每個部門——沒有任何團隊不受這些變化的影響。\ninvolve (vt.) 使涉入；包含，需要。involve every department = 涉及每個部門。"],
[3,"FILL","The government introduced new measures to strengthen the e_______y and create more jobs for young people.","economy",null,"e_______y|the system of trade and money in a country; related to finance and production","📖 政府推出新措施以強化經濟並為年輕人創造更多就業機會。\neconomy (n.) 經濟；節省。strengthen the economy = 強化經濟，固定搭配。"],
[4,"FILL","The lawyer argued that without solid e_______e, the charges against her client could not be upheld in court.","evidence",null,"e_______e|facts or information showing whether something is true; proof; what a lawyer needs in court","📖 律師主張，若無確鑿證據，對其委託人的指控便無法在法庭上成立。\nevidence (n.) 證據（不可數）。solid evidence = 確鑿證據，固定搭配。"],
[5,"FILL","Many students choose to a_______e practical skills, such as coding and public speaking, outside the classroom.","acquire",null,"a_______e|to gain or obtain through effort or experience; to pick up a skill or knowledge","📖 許多學生選擇在課堂外習得實用技能，例如程式設計和公開演講。\nacquire (vt.) 獲得，習得。acquire skills = 習得技能，固定搭配。"],
[6,"FILL","The school trip was open to all students, i_________g those who had signed up at the last minute.","including",null,"i_________g|taking in as part of a group; not leaving out; used before examples of what is covered","📖 這次校外教學對所有學生開放，包括那些在最後一刻才報名的人。\nincluding (prep.) 包括。including those who... = 包括那些……的人。"],
[7,"FILL","A short walk in the park every afternoon helped r_______e the stress the graduate student had built up during long hours of studying.","relieve",null,"r_______e|to reduce or ease pain, stress, or difficulty; to make something less severe","📖 每天下午在公園短暫散步，有助於減輕她長時間讀書所積累的壓力。\nrelieve (vt.) 減輕；寬慰；解除。relieve stress = 減輕壓力，固定搭配。"],
[8,"FILL","The teenager became so a_______d to checking his phone every few minutes that he could not focus on anything for more than ten seconds.","addicted",null,"a_______d|unable to stop doing something because of habit; hooked on; opposite of free from","📖 他對每隔幾分鐘查看手機變得如此上癮，以致無法專注於任何事情超過十秒。\naddict (vt.) 使上癮（沈迷）。be addicted to = 對…上癮，固定搭配（過去分詞作形容詞）。"],
[9,"FILL","The new principal spoke with a_________y — every teacher in the room immediately understood that her decisions were final.","authority",null,"a_________y|the power or right to give orders and make decisions; confident command","📖 新校長說話充滿權威——房間裡的每位老師立刻明白她的決定是最終的。\nauthority (n.) 權威（力）；當局（複數）。speak with authority = 以權威口吻說話。"],
[10,"FILL","The program — i_________g three months of fieldwork, two written reports, and a final oral presentation — was far more demanding than any student had anticipated.","involving",null,"i_________g|requiring participation in; made up of; used to describe what a process or activity consists of","📖 這個課程——包含三個月的田野調查、兩份書面報告和一次最終口頭報告——比任何學生預期的都要求更高。

[12,"FILL","The concert hall has a seating c_______y of two thousand people, making it the largest venue in the city.","capacity",null,"c_______y|the maximum amount something can hold or contain; ability to do something","📖 這座音樂廳的座位容量為兩千人，使其成為城市中最大的場地。\ncapacity (n.) 容量；能力；職能。seating capacity = 座位容量，固定搭配。"],
[13,"FILL","Clear c_____________n between team members is essential — without it, even the best plan will fall apart during execution.","communication",null,"c_____________n|the sharing of information between people; how ideas and messages are exchanged","📖 團隊成員之間清晰的溝通至關重要——沒有它，即使是最好的計畫在執行時也會崩潰。\ncommunication (n.) 通訊；溝通；傳達。clear communication = 清晰的溝通，固定搭配。"],

[16,"FILL","Wearing a seatbelt is the single most effective measure for p_________n of serious injury in a car accident.","prevention",null,"p_________n|stopping something harmful before it happens; keeping something bad from occurring","📖 繫上安全帶是預防車禍中嚴重傷害最有效的單一措施。\nprevention (n.) 預防。prevention of = 對…的預防；disease prevention = 疾病預防。"],

[4,"CTX","Medicine is a ______ that requires years of study, ongoing training, and a genuine commitment to patient care — qualities that cannot be replaced by automation or artificial intelligence.",["profession","hobby","job","subject"],0,null,"profession (n.) 需要專業訓練的職業。years of study and ongoing training = profession（需資格認證的專業職業）；hobby = 嗜好；job = 工作（廣義）；subject = 學科。"],

[12,"CTX","The theater has a seating ______ of five hundred and has been completely sold out for every Friday and Saturday performance this season.",["capacity","record","reputation","history"],0,null,"seating capacity（座位容量）固定搭配。five hundred seats = capacity（最大容納量）；record = 紀錄；reputation = 聲譽；history = 歷史。"],

[1,"MC","Working with local health clinics, the government launched a campaign to ______ awareness about teen mental health — specifically by putting the topic on school curricula and training teachers to recognize early warning signs.",["increase","promote","spread","raise"],3,null,"raise awareness（提升意識）是政府公共衛生活動中最標準的固定搭配，通常接 about。putting topic on curricula and training teachers = raise awareness（透過教育正式提升認知）；increase awareness 也可但較口語；promote 偏向推廣某事物；spread 偏向散播訊息（未必有計劃性）。"],
[2,"MC","After the earthquake, thousands of families were ______ — forced to abandon their homes and live in temporary shelters set up by international aid organizations.",["displaced","affected","relocated","separated"],0,null,"displaced (adj.) 流離失所的。forced to abandon their homes = displaced；affected = 受影響的（廣義）；relocated = 被安置到新地點（通常有計劃性）；separated = 被分散（強調家人分離）。"],
[3,"MC","Dr. Chen's ______ attitude allowed her to switch effortlessly between Mandarin, English, and Taiwanese depending on who she was speaking to, making everyone feel at ease.",["open","adaptable","cooperative","flexible"],3,null,"flexible (adj.) 靈活的；能隨機應變的。switch effortlessly depending on the situation = flexible；open = 開放的（思想）；adaptable = 適應力強的（較長期）；cooperative = 合作的（與他人配合）。"],
[4,"MC","The lawyer carefully ______ each piece of evidence, running statistical tests and cross-referencing dates to identify hidden patterns that the opposing team had missed.",["examined","analyzed","studied","reviewed"],1,null,"analyze (v.) 分析（系統性拆解以找出規律）。running statistical tests to find patterns = analyzed；examined = 仔細檢查（觀察）；studied = 研究（廣義）；reviewed = 審閱（查看是否正確）。"],
[5,"MC","The project required ______ cooperation that spanned eighteen months, involved over three hundred joint meetings, and produced more than two thousand shared documents — a scale of collaboration neither team had attempted before.",["close","strong","extensive","effective"],2,null,"extensive (adj.) 大規模的（強調合作的範圍和數量之龐大）。over three hundred meetings and two thousand documents = extensive（數量和規模之大）；close = 密切的（關係緊密，不特別強調數量）；strong = 強而有力的（力度）；effective = 有效的（結果）。"],
[6,"MC","The editor was known for her ______ attention to detail — she once spotted a misplaced comma on page 312 that three other editors had missed entirely.",["exceptional","extraordinary","remarkable","impressive"],2,null,"remarkable (adj.) 非凡的；值得注意的（某事突出到足以被特別提及）。spotted what three others missed = remarkable；remarkable attention to detail 是最常用的固定搭配。"],
[7,"MC","In order to ______ its operating costs without cutting any jobs, the company switched entirely to digital reports — a move that saved over two hundred thousand dollars in its first year.",["cut","lower","minimize","reduce"],3,null,"reduce costs（降低成本）最正式的商業固定搭配；locked by save over two hundred thousand in the first year = reduce（達到持續性的降低）；cut = 削減（較激烈，通常暗示砍掉某項目）；lower = 降低（口語）；minimize = 最小化（盡可能降到最低，程度比 reduce 更強）。"],
[8,"MC","The athlete's ______ performance earned her a place in the record books — she not only won gold but shattered the national record by two full seconds, a margin that coaches called unprecedented.",["excellent","outstanding","brilliant","exceptional"],1,null,"outstanding (adj.) 傑出的（突出於其他所有人之上，有拔尖的意象）。shattered the national record by two seconds, coaches called unprecedented = outstanding（在眾人中突出的表現）；excellent = 優秀的（評語，不強調比較）；brilliant = 才華橫溢的（通常指智識）；exceptional = 例外優秀的（也可，但 outstanding performance 是體育語境的最常見搭配）。"],
[9,"MC","The ______ of the community park — officially founded after years of planning and fundraising — gave residents a much-needed green space in the otherwise concrete-covered district.",["creation","establishment","opening","construction"],1,null,"establishment (n.) 建立；設立（正式成立機構或場所）。officially founded after planning = establishment；creation = 創造（廣義）；opening = 開幕（第一天開放）；construction = 建造（物理建設過程）。"],
[10,"MC","The job applicant left a lasting impression on the interview panel — she spoke with clear logic and genuine passion for the field, and they were thoroughly ______.",["impressed","surprised","amazed","astonished"],0,null,"impress (v.) 使留下深刻的正面印象。clear logic and genuine passion = impressed（對能力和熱忱留下好印象）；surprised/amazed/astonished 表震驚，偏向意外程度，與此語境不符。"],
[11,"MC","The documentary ______ a rarely seen side of daily life in remote mountain villages, bringing to light customs and traditions that most outsiders had never witnessed.",["revealed","exposed","uncovered","showed"],0,null,"reveal (v.) 揭示；展現（帶出之前未知的事物）。bringing to light what had never been witnessed = revealed；exposed = 揭露（通常帶負面含義）；uncovered = 挖掘出（偏向調查）；showed 太中性。"],
[12,"MC","The CEO's ______ response to the crisis — she was on camera within the hour, long before competitors in similar situations had even drafted a statement — helped protect the company's reputation.",["prompt","immediate","swift","quick"],2,null,"swift (adj.) 迅速的；果斷的。issued a statement within the hour = swift response（快速且果斷）；prompt = 即時的（準時）；immediate = 立即的（無延遲）；quick = 快速的（口語）。"],
[13,"MC","The teacher's ______ explanation broke every rule into a single visual diagram — students who had failed this grammar point three times before finally understood it completely.",["simple","clear","effective","helpful"],1,null,"clear (adj.) 清晰的（說明表達得讓人一看就懂）。students who failed three times before finally understood = clear explanation（清楚到突破理解障礙）；simple = 簡單的（不複雜，但未必讓人理解）；effective = 有效的（結果好，但範圍更廣）；helpful = 有幫助的（廣義）。"],
[14,"MC","From her very first day, the new hire made a conscious effort to ______ a strong relationship with each colleague — greeting everyone by name, asking questions, and always offering to help with small tasks.",["develop","build","establish","maintain"],1,null,"build a relationship（建立關係）最自然的固定搭配，強調主動逐步構築。greeting everyone by name and offering to help from day one = build（主動一磚一瓦地構築）；develop = 發展（長期演進）；establish = 正式建立（帶有更正式的意味）；maintain = 維持（已有的關係）。"],
[15,"MC","The storm caused widespread ______ across the region — repair crews worked for weeks to restore flooded roads and downed power lines before life could return to normal.",["destruction","disruption","damage","chaos"],2,null,"damage (n.) 損害；破壞（可修復的物質損失）。repair crews restoring roads and power lines = damage（可修復的損壞）；destruction = 毀滅（不可修復）；disruption = 中斷（服務）；chaos = 混亂（秩序）。"],
[16,"MC","Even as the fire raged around him, the firefighter showed remarkable ______ — his voice never wavered, his hands never shook, and his decisions were clear and precise.",["composure","courage","determination","discipline"],0,null,"composure (n.) 沉著；鎮定（在壓力下保持冷靜的外在表現）。voice never wavered, hands never shook = composure；courage = 勇氣（克服恐懼）；determination = 決心（意志力）；discipline = 紀律（自我管理）。"],
[17,"MC","The new fundraising strategy was so ______ that it achieved in seven days what the previous five campaigns had failed to achieve in two years — every single tactic worked exactly as planned.",["successful","impressive","remarkable","effective"],3,null,"effective (adj.) 有效的（方法達到了預期效果）。every single tactic worked exactly as planned = effective（策略奏效、有效果）；successful = 成功的（也可，但 effective 強調「方法本身有效」的因果關係，而 successful 只說結果好）；impressive = 令人印象深刻的；remarkable = 非凡的。"],
[18,"MC","The writing teacher asked students to ______ their essays before submitting — specifically checking for spelling errors, typos, and missing punctuation.",["revise","review","proofread","edit"],2,null,"proofread (v.) 校對（專門找拼字、標點等表面錯誤）。checking for spelling errors, typos, and punctuation = proofread；revise = 修改內容；review = 審閱（整體）；edit = 編輯（措辭和結構）。"],
[19,"MC","The ______ of the ancient palace took twenty years and required historians to study original blueprints so that the building could be returned to its exact historical condition.",["reconstruction","renovation","repair","restoration"],3,null,"restoration (n.) 修復（恢復到原始歷史狀態）。returned to its exact historical condition = restoration；reconstruction = 重建（從頭建造）；renovation = 翻新（現代化改善）；repair = 修理（小規模修補）。"],
[20,"MC","Without consistent ______ — the hours spent studying, failing, and trying again — even the most naturally gifted students will never reach their full potential.",["effort","practice","dedication","commitment"],0,null,"effort (n.) 努力；付出的心力。hours spent studying, failing, and trying again = effort；practice = 練習（重複行為）；dedication = 奉獻（長期投入的精神）；commitment = 承諾（決心堅持）。"]

[12,"CTX","At sixty-two, the retired teacher ______ the one goal she had always postponed during her working years: running a full marathon, crossing the finish line in just under five hours.",["accomplished","abandoned","attempted","postponed"],0,null,"accomplish (v.) 達成（完成一項具體的目標）。crossing the finish line = accomplished；abandoned = 放棄（反義）；attempted = 嘗試（未必成功）；postponed = 延後（反義）。"],

A:[
[1,"MC","The environmental group launched a campaign to ______ single-use plastic bags entirely, calling for hefty fines for any business caught distributing them.",["restrict","limit","ban","reduce"],2,null,"ban (v.) 全面禁止（使其完全不合法）。outlawed entirely with fines = ban；restrict = 限制（有條件地限制）；limit = 限量；reduce = 減少（數量）。"],
[2,"MC","Her ______ approach to the negotiations ensured that neither side felt they had been asked to give up more than the other, leading to a deal both parties felt was fair.",["flexible","cautious","balanced","diplomatic"],2,null,"balanced (adj.) 均衡的（確保兩方利益均等）。neither side felt they gave up more = balanced；flexible = 靈活的；cautious = 謹慎的；diplomatic = 有外交手腕的。"],
[3,"MC","The new safety regulations were ______ the very morning after the accident — inspection teams were already on site before noon, and every affected factory had received a written order by end of day.",["introduced","enforced","implemented","established"],2,null,"implement (v.) 實施（將已決定的規定付諸實際行動）。inspection teams on site before noon = implemented（立即付諸執行）；introduced = 引入（首次提出，不強調執行）；enforced = 強制執行（懲罰違規，有法律強制性）；established = 建立（正式設立，通常指長期制度）。"],
[4,"MC","The junior employee took a long, slow breath, ______ her courage, and stepped forward to tell her manager directly that the project plan had a critical flaw.",["summoned","gathered","found","mustered"],1,null,"gather courage（鼓起勇氣）固定搭配。took a long breath before speaking = gathered courage；summon courage 也常見但較文學；find courage 較口語；muster courage 較軍事語境。"],
[5,"MC","The charity's mission is to ______ poverty in rural areas by providing job training and microloans to the most vulnerable households in the region.",["reduce","eliminate","address","alleviate"],3,null,"alleviate poverty（緩解貧困）固定搭配。microloans to vulnerable households = alleviate（減輕苦況，非消除）；reduce = 減少（數量）；eliminate = 消除（對微型貸款而言過於理想）；address = 處理（廣義）。"],
[6,"MC","His ______ use of bold, clashing colors made his paintings instantly recognizable — you could identify his work across a crowded gallery without ever looking at the signature.",["unique","distinctive","characteristic","remarkable"],1,null,"distinctive (adj.) 有辨識度的（一眼就能認出）。instantly recognizable without looking at signature = distinctive；unique = 獨一無二的；characteristic = 典型的；remarkable = 非凡的。"],
[7,"MC","She ______ a complex dataset by turning thousands of rows of numbers into a single clear chart that even non-specialists could understand at a glance.",["organized","simplified","summarized","reduced"],1,null,"simplify (v.) 簡化（使複雜的東西容易理解）。non-specialists could understand at a glance = simplified；organized = 整理（有序）；summarized = 摘要（縮短）；reduced = 減少（數量）。"],
[8,"MC","After the new model failed, the company decided to ______ its entire production line — laying off one hundred workers, relocating manufacturing overseas, and redesigning the management hierarchy.",["reorganize","reform","restructure","revise"],2,null,"restructure (v.) 重組（對組織進行根本性的結構改變）。laid off workers + relocated + redesigned hierarchy = restructure；reorganize = 重新整理（較小規模）；reform = 改革（制度）；revise = 修訂（文件）。"],
[9,"MC","The lawyer's ______ commitment to social justice — she never once backed down, even when threatened or publicly ridiculed — inspired an entire generation of young activists.",["strong","unwavering","deep","lifelong"],1,null,"unwavering (adj.) 堅定不移的（從不動搖）。never backed down even when threatened = unwavering；strong = 強烈的；deep = 深刻的；lifelong = 終生的。"],
[10,"MC","The documentary ______ the serious long-term consequences of ignoring climate change by projecting alarming statistics onto a giant screen and interviewing scientists on the front lines.",["highlighted","exposed","revealed","showed"],0,null,"highlight (v.) 強調；突顯（吸引注意力至重要事項）。projecting statistics to draw attention = highlighted；exposed = 揭露（負面事物）；revealed = 揭示（之前未知）；showed 太中性。"],
[11,"MC","The account manager returned from a two-week vacation to find over three hundred unread emails waiting — she felt completely ______ by the sheer volume.",["exhausted","frustrated","stressed","overwhelmed"],3,null,"overwhelmed (adj.) 不堪負荷的（數量或規模壓倒了應對能力）。over three hundred emails = overwhelmed by the volume；exhausted = 疲憊的（身體）；frustrated = 沮喪的（遭遇阻礙）；stressed = 壓力大的（廣義）。"],
[12,"MC","The company's ______ to transparency was not just words — for fifteen consecutive years, without a single gap, it published a full public audit of its environmental and social impact, even in years when the results were unflattering.",["dedication","devotion","contribution","commitment"],3,null,"commitment to transparency（對透明度的承諾）固定搭配，強調做出承諾並長期兌現。even in years when results were unflattering = commitment（對承諾的兌現，不論結果好壞）；dedication = 奉獻（個人投入的精神）；devotion = 熱忱（情感上的投入）；contribution = 貢獻（提供的東西）。"],
[13,"MC","Sara ______ her daily forty-minute commute to listen to podcasts on leadership and business strategy, effectively turning the ride into a personal classroom.",["used","spent","took","made"],0,null,"use sth. to do sth.（利用某事做某事）固定搭配。turned the ride into a classroom = used her commute to；spent time doing = 後接 V-ing；took 不搭配此結構；made 不自然。"],
[14,"MC","The new software ______ users to do things that were simply impossible before — analyzing spending in real time, setting automated savings rules, and generating a complete monthly financial report with a single tap.",["allows","helps","encourages","enables"],3,null,"enable sb. to do（使某人能夠做…）固定搭配，強調技術上使某事成為可能。things that were simply impossible before = enables（使原本不可能的事成為可能）；allows = 允許（給予許可）；helps = 幫助（輔助，事情原本就可做）；encourages = 鼓勵（心理層面）。"],
[15,"MC","After years of ______ — laboratory experiments, clinical trials, and exhausting rounds of peer review — the team finally developed a vaccine effective against the most dangerous strain.",["effort","research","work","study"],1,null,"research (n.) 研究（系統性的科學調查）。laboratory experiments + clinical trials + peer review = research；effort = 努力（廣義）；work = 工作（廣義）；study 通常不包含 clinical trials。"],
[16,"MC","The author had a rare ability to ______ personally with readers — many wrote letters saying they felt she had somehow read their private journals before writing the book.",["communicate","resonate","connect","engage"],2,null,"connect with readers（與讀者產生連結）固定搭配。felt she was writing directly to them = connect with；communicate = 傳達訊息；resonate with 也可；engage = 吸引注意。"],

[2,"MC","Her ______ nature was most evident under pressure — even when colleagues raised their voices or made personal attacks, she would pause, breathe, and reply in the same even, quiet tone she always used.",["patient","steady","calm","gentle"],2,null,"calm (adj.) 冷靜的（在壓力或衝突下保持情緒平穩）。raised voices and personal attacks, yet same even quiet tone = calm（情緒上的冷靜）；patient = 有耐心的（願意等待）；steady = 穩定的（不起伏，偏物理）；gentle = 溫和的（個性柔和，不特指壓力下的反應）。"],
[3,"MC","The film ______ at the themes of identity and belonging through the eyes of three generations of immigrants, using a combination of archival footage and modern interviews.",["looked","examined","explored","touched"],0,null,"look at（探討；審視某主題）固定片語。looked at themes through a specific lens = looked at；examined = 仔細檢查；explored = 探索（也可，但 looked at 是最自然的片語）；touched on = 簡短提及（程度淺）。"],

[5,"MC","The company's ______ strategy — focusing on building customer loyalty over a decade rather than chasing immediate profits — proved far more successful than its competitors' short-term approach.",["sustainable","effective","overall","long-term"],3,null,"long-term strategy（長期策略）固定搭配，與 short-term 對比。over a decade vs short-term approach = long-term；sustainable = 可持續的；effective = 有效的；overall = 整體的。"],
[6,"MC","The event coordinator worked ______ through every obstacle — when suppliers fell through, when the venue double-booked, when the weather forecast turned bad — never pausing, never complaining, just solving each problem and moving to the next.",["diligently","tirelessly","relentlessly","consistently"],1,null,"tirelessly (adv.) 不知疲倦地（完全不停歇地工作，不論多累都繼續）。never pausing, never complaining through every obstacle = tirelessly；diligently = 勤勉地（認真努力，但可以休息）；relentlessly = 無情地、不斷地（帶有壓迫感，偏負面）；consistently = 持續地（規律性，不強調不疲倦）。"],
[7,"MC","The government ______ over five hundred million dollars specifically for research into wind and solar energy, earmarking the funds so they could not be redirected elsewhere.",["devoted","dedicated","committed","allocated"],3,null,"allocate funds（分配資金）固定搭配。earmarked specifically = allocated（正式指定用途）；devoted = 奉獻（人的付出）；dedicated 也可，但 allocate 是財務資金的標準用語；committed = 承諾。"],

[9,"MC","His ______ attitude toward risk was legendary in the company — he refused to approve a single investment until it had been stress-tested against three worst-case scenarios and reviewed by two independent analysts.",["careful","conservative","cautious","prudent"],2,null,"cautious (adj.) 謹慎的（對風險保持高度警覺，採取預防措施）。stress-tested against three worst-case scenarios before approving = cautious（警覺地應對風險）；careful = 小心的（廣義，不特指風險意識）；conservative = 保守的（偏向少冒險，不強調主動分析）；prudent = 審慎明智的（也可，但 cautious attitude toward risk 是固定搭配）。"],
[10,"MC","The new platform ______ any registered user to share photos, videos, and travel stories with a global audience — no premium subscription, no special permission, no extra steps required.",["enables","allows","lets","permits"],1,null,"allow sb. to do（允許某人做…）固定搭配，強調給予使用的許可或權限。no premium subscription, no special permission required = allows（給予使用許可）；enables = 使能夠（技術上使其成為可能，強調之前無法做）；lets 較口語；permits = 正式法律許可。"],
[11,"MC","Despite the ______ of her speech — just three plain sentences, no technical language, no supporting slides, no statistics — the audience gave her a standing ovation because every word hit exactly where it needed to.",["brevity","simplicity","directness","clarity"],1,null,"simplicity (n.) 簡單；不複雜（相對於複雜性，強調內容的精簡）。three plain sentences, no technical language, no slides, no statistics = simplicity（內容上的簡單）；brevity = 簡短（長度上的簡短）；directness = 直接（表達方式直接）；clarity = 清晰（易懂）。"],
[12,"MC","The new environmental law was ______ by a two-thirds majority vote in both chambers of parliament, following three months of intense public debate.",["passed","approved","adopted","enacted"],0,null,"pass a law（通過法律）固定搭配，指立法機構投票通過。voted through by two-thirds majority = passed；approved = 批准（行政層面）；adopted = 採納；enacted = 頒布施行（生效）。"],

// ══════════════════════════════════════════════════════════════════════
// ENGINE
// ══════════════════════════════════════════════════════════════════════
let curW='w1', curTier='low';
let state={};
const ALPHA=['A','B','C','D'];

function initState(wk){
  if(!state[wk]) state[wk]={A:{},B:{},C:{}};
}
function getQs(wk,tier){
  const d=QDB[wk];
  if(wk==='bonus') return [{part:'A',qs:d.A}];
  if(tier==='low') return [{part:'A',qs:d.A}];
  if(tier==='mid') return [{part:'A',qs:d.A},{part:'B',qs:d.B}];
  return [{part:'A',qs:d.A},{part:'B',qs:d.B},{part:'C',qs:d.C}];
}
function setTier(t,el){
  curTier=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function switchWeek(wk){
  curW=wk;
  document.querySelectorAll('.wt').forEach(b=>b.classList.remove('active'));
  document.getElementById('wt_'+wk).classList.add('active');
  render();
}

function render(){
  initState(curW);
  const d=QDB[curW];
  const isBonus=curW==='bonus';
  document.getElementById('winfo').innerHTML=
    isBonus
    ? `<span class="wl">⭐ 學測考古題挑戰</span><span class="ws">📖 ${d.srcA}</span>`
    : `<span class="wl">第 ${d.week} 週　${d.dates}</span>`+
      `<span class="ws">📖 Part A：${d.srcA}</span>`+
      `<span class="ws">✏️ Part B：${d.srcB}</span>`+
      `<span class="ws">🔤 Part C：${d.srcC}</span>`;
  const groups=getQs(curW,curTier);
  const partLabel={A:'Part A　選擇題（Vocabulary in Context）',B:'Part B　填空題（Guided Fill-in）',C:'Part C　進階題（Word Formation & Context）'};
  let html='';
  groups.forEach(g=>{
    html+=`<div class="ph ${g.part}">📝 ${partLabel[g.part]}</div>`;
    g.qs.forEach((q,i)=>{
      const qid=`${curW}_${g.part}_${i}`;
      const st=state[curW][g.part][i]||{done:false,correct:false};
      const cls=st.done?(st.correct?'correct':'wrong'):'';
      const [id,type,stem,opts,ans,hint,expl]=q;
      const stemHtml = stem.replace(/\n/g,'<br>');
      if(type==='MC'||type==='ROOT'||type==='CTX'){
        const btns=opts.map((o,oi)=>{
          let bcls='ob';
          if(st.done){
            if(oi===ans) bcls+=' correct';
            else if(oi===st.chosen) bcls+=' wrong';
          }
          return `<button class="${bcls}" onclick="answerMC('${curW}','${g.part}',${i},${oi},${ans},'${qid}')" ${st.done?'disabled':''}><span class="ol">${ALPHA[oi]}.</span>${o}</button>`;
        }).join('');
        const expHtml=st.done?`<div class="exp show"><span class="exl">解析</span>${expl}</div>`:`<div class="exp"></div>`;
        html+=`<div class="qc ${cls}" id="${qid}">
          <div class="qh"><div class="qn">${i+1}</div><div class="qt">${stemHtml}</div><span class="qtag ${type}">${type}</span></div>
          <div class="opts">${btns}</div>${expHtml}</div>`;
      } else {
        const val=st.done?(st.correct?ans:(st.typed||'')):'';
        const fiCls=st.done?(st.correct?'correct':'wrong'):'';
        const expHtml=st.done?`<div class="exp show"><span class="exl">解析</span>${expl}</div>`:`<div class="exp"></div>`;
        const wrongAns=st.done&&!st.correct?`<div class="fh">✅ 正確答案：${ans}</div>`:'';
        let hintHtml='';
        if(hint){
          const hParts=hint.split('|');
          const hBlank=hParts[0];
          const hText=hParts.slice(1).join('|');
          hintHtml=`<div class="hint-box"><span class="hint-blank">${hBlank}</span><span class="hint-sep"> — </span><span class="hint-text">${hText}</span></div>`;
        }
        html+=`<div class="qc ${cls}" id="${qid}">
          <div class="qh"><div class="qn">${i+1}</div><div class="qt">${stemHtml}</div><span class="qtag FILL">FILL</span></div>
          ${hintHtml}
          <div class="fr">
            <input class="fi ${fiCls}" id="fi_${qid}" placeholder="輸入答案…" value="${val}" ${st.done?'disabled':''}
              onkeydown="if(event.key==='Enter')checkFill('${curW}','${g.part}',${i},'${qid}')">
            <button class="ck" id="ck_${qid}" onclick="checkFill('${curW}','${g.part}',${i},'${qid}')" ${st.done?'disabled':''}>確認</button>
          </div>${wrongAns}${expHtml}</div>`;
      }
    });
  });
  document.getElementById('qa').innerHTML=html;
  updateScore();
}

function answerMC(wk,part,idx,chosen,ans,qid){
  state[wk][part][idx]={done:true,correct:chosen===ans,chosen};
  render();
  setTimeout(()=>document.getElementById(qid)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function checkFill(wk,part,idx,qid){
  const inp=document.getElementById('fi_'+qid);
  if(!inp) return;
  const typed=inp.value.trim().toLowerCase();
  const ans=QDB[wk][part][idx][3].toLowerCase();
  state[wk][part][idx]={done:true,correct:typed===ans,typed:inp.value.trim()};
  render();
  setTimeout(()=>document.getElementById(qid)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function updateScore(){
  const groups=getQs(curW,curTier);
  let tot=0,cor=0,ans=0;
  groups.forEach(g=>{
    g.qs.forEach((_,i)=>{
      tot++;
      const s=state[curW]?.[g.part]?.[i];
      if(s?.done){ans++; if(s.correct) cor++;}
    });
  });
  document.getElementById('sn').textContent=`${cor} / ${ans}`;
  document.getElementById('pf').style.width=tot>0?`${ans/tot*100}%`:'0%';
  const allDone=ans===tot;
  if(allDone) document.getElementById('wt_'+curW)?.classList.add('done');
}

function showResult(){
  const groups=getQs(curW,curTier);
  let tot=0,cor=0;
  groups.forEach(g=>{ g.qs.forEach((_,i)=>{ tot++; const s=state[curW]?.[g.part]?.[i]; if(s?.correct) cor++; }); });
  const pct=tot>0?Math.round(cor/tot*100):0;
  document.getElementById('msc').textContent=`${pct}%`;
  const msgs=[
    [90,'🏆 表現優異！繼續保持，下週更上一層樓！'],
    [70,'💪 不錯的成績！再檢視錯題，可以更進步。'],
    [50,'📚 繼續加油！建議重新複習本週字彙。'],
    [0,'🔁 別氣餒！多讀幾遍課文，重新挑戰！']
  ];
  document.getElementById('mmsg').textContent=msgs.find(([t])=>pct>=t)[1];
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function retryWrong(){
  closeModal();
  const groups=getQs(curW,curTier);
  groups.forEach(g=>{ g.qs.forEach((_,i)=>{ const s=state[curW]?.[g.part]?.[i]; if(s&&!s.correct) state[curW][g.part][i]={done:false}; }); });
  render();
}

// Build week tabs
(function(){
  const tabs=document.getElementById('wkTabs');
  for(let w=1;w<=8;w++){
    const id='w'+w;
    const btn=document.createElement('button');
    btn.className='wt'+(w===1?' active':'');
    btn.id='wt_'+id;
    btn.textContent='W'+w;
    btn.onclick=()=>switchWeek(id);
    tabs.appendChild(btn);
  }
  // Bonus tab
  const bonusBtn=document.createElement('button');
  bonusBtn.className='wt';
  bonusBtn.id='wt_bonus';
  bonusBtn.textContent='⭐ 考古題';
  bonusBtn.style.background='#FFF8E1';
  bonusBtn.style.borderColor='#F57F17';
  bonusBtn.style.color='#E65100';
  bonusBtn.onclick=()=>switchWeek('bonus');
  tabs.appendChild(bonusBtn);
})();
render();
</script>
</body>
</html>
