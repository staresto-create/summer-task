<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍騰英文 暑假字彙練習 W1–W8</title>
<style>
:root {
  --navy:#1F4E79; --navyD:#163a5a;
  --low:#1F497D; --lowLt:#DDEEFF; --lowMd:#BDD7EE;
  --mid:#375623; --midLt:#E2EFDA; --midMd:#C6E0B4;
  --high:#7B3F00; --highLt:#FCE4D6; --highMd:#F8CBAD;
  --ok:#1B5E20; --okBg:#E8F5E9;
  --err:#B71C1C; --errBg:#FFEBEE;
  --exp:#F57F17; --expBg:#FFF8E1;
  --grey:#555; --greyLt:#F5F5F5; --border:#DDD;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;background:#EEF2F7;color:#222;font-size:15px;line-height:1.6}
header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:700;flex:1}
.badge{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:13px;white-space:nowrap}
.wrap{max-width:920px;margin:0 auto;padding:18px 14px 60px}

.week-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.wt{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:14px;font-weight:700;color:var(--grey);transition:all .18s}
.wt:hover{border-color:var(--navy);color:var(--navy)}
.wt.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.wt.done{border-color:var(--ok);color:var(--ok)}
.wt.done.active{background:var(--ok);color:#fff;border-color:var(--ok)}

.tier-bar{display:flex;gap:0;margin-bottom:18px;border-radius:var(--r);overflow:hidden;border:2px solid var(--border)}
.tb{flex:1;padding:10px 6px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all .18s;background:#fff;line-height:1.3}
.tb:not(:last-child){border-right:2px solid var(--border)}
.tb.low{color:var(--low)} .tb.mid{color:var(--mid)} .tb.high{color:var(--high)}
.tb.active.low{background:var(--low);color:#fff} .tb.active.mid{background:var(--mid);color:#fff} .tb.active.high{background:var(--high);color:#fff}
.td{display:block;font-weight:400;font-size:11px;opacity:.85;margin-top:2px}

.winfo{background:#fff;border-radius:var(--r);padding:11px 15px;margin-bottom:16px;border-left:4px solid var(--navy);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.wl{font-weight:700;color:var(--navy);font-size:15px}
.ws{font-size:13px;color:var(--grey)}

.sbar{background:#fff;border-radius:var(--r);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border:1px solid var(--border)}
.sn{font-size:26px;font-weight:900;color:var(--navy);line-height:1}
.sl{font-size:12px;color:var(--grey)}
.prog{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;min-width:60px}
.pf{height:100%;background:var(--navy);border-radius:4px;transition:width .35s}
.sub-btn{margin-left:auto;padding:9px 20px;border-radius:6px;border:none;background:var(--navy);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.sub-btn:hover{opacity:.88}

.ph{padding:8px 14px;border-radius:var(--r);margin:18px 0 10px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.ph.A{background:var(--lowMd);color:var(--low)} .ph.B{background:var(--midMd);color:var(--mid)} .ph.C{background:var(--highMd);color:var(--high)}

.qc{background:#fff;border-radius:var(--r);padding:16px 18px;margin-bottom:10px;border:1.5px solid var(--border);transition:border-color .2s}
.qc.correct{border-color:var(--ok)} .qc.wrong{border-color:var(--err)}
.qh{display:flex;gap:10px;align-items:flex-start;margin-bottom:11px}
.qn{background:var(--navy);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.qt{font-size:15px;flex:1}
.qtag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:auto;white-space:nowrap;align-self:flex-start}
.qtag.MC{background:#E3F2FD;color:#1565C0}
.qtag.FILL{background:#E0F2F1;color:#00695C}
.qtag.ROOT{background:#EDE7F6;color:#6A1B9A}
.qtag.CTX{background:#FFF3E0;color:#E65100}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
@media(max-width:520px){.opts{grid-template-columns:1fr}}
.ob{padding:8px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--greyLt);cursor:pointer;text-align:left;font-size:14px;transition:all .18s;color:#222;width:100%}
.ob:hover:not(:disabled){border-color:var(--navy);background:var(--lowLt)}
.ob.correct{background:var(--okBg);border-color:var(--ok);color:var(--ok);font-weight:700}
.ob.wrong{background:var(--errBg);border-color:var(--err);color:var(--err)}
.ob.reveal{background:var(--okBg);border-color:var(--ok);color:var(--ok)}
.ol{display:inline-block;width:20px;font-weight:700}

.fr{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.fi{flex:1;min-width:150px;padding:8px 11px;border-radius:6px;border:1.5px solid var(--border);font-size:15px;outline:none}
.fi:focus{border-color:var(--navy)}
.fi.correct{border-color:var(--ok);background:var(--okBg);color:var(--ok)}
.fi.wrong{border-color:var(--err);background:var(--errBg);color:var(--err)}
.fh{font-size:12px;color:var(--grey);margin-top:4px}
.hint-box{background:#F3F0FF;border-left:3px solid #7C4DFF;border-radius:0 6px 6px 0;padding:7px 12px;margin:8px 0 4px;font-size:13px}
.hint-blank{font-family:monospace;font-weight:700;color:#5E35B1;letter-spacing:1px}
.hint-sep{color:#999;margin:0 4px}
.hint-text{color:#444;font-style:italic}
.ck{padding:8px 16px;border-radius:6px;border:none;background:var(--navy);color:#fff;cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap}
.ck:disabled{opacity:.5;cursor:default}

.exp{background:var(--expBg);border-left:3px solid var(--exp);border-radius:0 6px 6px 0;padding:9px 13px;margin-top:10px;font-size:13px;color:#555;display:none;white-space:pre-line}
.exp.show{display:block}
.exl{font-weight:700;color:var(--exp);margin-right:4px}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.mo.show{display:flex}
.mb{background:#fff;border-radius:12px;padding:30px 24px;max-width:460px;width:100%;text-align:center}
.mb h2{font-size:20px;color:var(--navy);margin-bottom:6px}
.bsc{font-size:54px;font-weight:900;line-height:1.1;margin:10px 0}
.smsg{font-size:14px;color:var(--grey);margin-bottom:18px}
.mc-btn{padding:10px 26px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin:4px}
.mc-btn.sec{background:#fff;border:2px solid var(--navy);color:var(--navy)}
</style>
</head>
<body>
<header>
  <h1>🌞 龍騰英文　高一升高二暑假字彙練習</h1>
  <span class="badge">W1–W8 ∙ 每週 60 題 ∙ 三層分級</span>
</header>
<div class="wrap">
  <div class="week-tabs" id="wkTabs"></div>
  <div class="tier-bar">
    <button class="tb low active" onclick="setTier('low',this)">🔵 基礎鞏固型<span class="td">Low · 做 Part A（20題）</span></button>
    <button class="tb mid" onclick="setTier('mid',this)">🟢 穩健提升型<span class="td">Mid · 做 A+B（40題）</span></button>
    <button class="tb high" onclick="setTier('high',this)">🟠 全力衝刺型<span class="td">High · 做全部（60題）</span></button>
  </div>
  <div class="winfo" id="winfo"></div>
  <div class="sbar" id="sbar">
    <div><div class="sn" id="sn">0 / 0</div><div class="sl">已答對 / 已作答</div></div>
    <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
    <button class="sub-btn" onclick="showResult()">查看本週成績 →</button>
  </div>
  <div id="qa"></div>
</div>
<div class="mo" id="modal">
  <div class="mb">
    <h2>本週練習成果</h2>
    <div class="bsc" id="msc"></div>
    <div class="smsg" id="mmsg"></div>
    <button class="mc-btn" onclick="closeModal()">繼續複習</button>
    <button class="mc-btn sec" onclick="retryWrong()">只練錯題</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════
// QUIZ DATA — 8 weeks × 60 questions
// Part A: 20 MC  |  Part B: 20 FILL  |  Part C: 20 ROOT/CTX MC
// FILL format: question has blank encoded as x___y in stem
// Explanation always starts with 📖 full Chinese translation of stem
// ══════════════════════════════════════════════════════════════════════

const QDB = {

// ─────────────────────────────────────────────────────────────────────
// WEEK 1  B1 L1–L4 + Core Vocab L3 U01–U03
// ─────────────────────────────────────────────────────────────────────
w1:{week:1,dates:"7/1–7/6",srcA:"B1 L1–L4",srcB:"Core Vocab L3 U01–U03",srcC:"字根字首綜合 I",
A:[
[1,"MC","The ______ ceremony left everyone in tears — truly unforgettable.",["memorable","depressed","embarrassed","fortunately"],0,null,"memorable (adj.) 難忘的。memory → memorable，令人難忘的場合。"],
[2,"MC","She accidentally ______ her sister's expensive vase and felt terrible about it.",["ruined","recalled","reflected","skipped"],0,null,"ruin (vt.) 破壞；毀壞。ruined = 毀壞了。"],
[3,"MC","After failing three exams in a row, he felt ______ and lost all motivation.",["depressed","embarrassed","upset","traditional"],0,null,"depressed (adj.) 沮喪的。de-（向下）+ press（壓）→ 情緒被向下壓。"],
[4,"MC","The bad news ______ her so much that she could not sleep all night.",["upset","ruined","skipped","recalled"],0,null,"upset (vt.) 使難過。The news upset her."],
[5,"MC","He knocked over the teacher's coffee and felt ______ in front of everyone.",["embarrassed","depressed","upset","memorable"],0,null,"embarrassed (adj.) 尷尬的。在眾人面前出醜。"],
[6,"MC","She closed her eyes and tried to ______ where she had last seen her keys.",["recall","reflect","remind","realize"],0,null,"recall (vt.) 記起；回想起。re-（回）+ call（呼叫）→ 把記憶喚回。"],
[7,"MC","The old photo on the wall ______ him of happy childhood days in the countryside.",["reminded","recalled","reflected","realized"],0,null,"remind sb. of sth. 使某人想起某事，固定搭配。"],
[8,"MC","After the failure, she sat quietly and tried to ______ on what had gone wrong.",["reflect","remind","realize","recall"],0,null,"reflect (vi.) 認真思考；沉思。re-（回）+ flect（彎）→ 把思緒折回。"],
[9,"MC","It took him years to ______ that consistent effort matters more than raw talent.",["realize","reflect","remind","recall"],0,null,"realize (vt.) 了解；領悟。re-（完全）+ alize → 使完全理解。"],
[10,"MC","She gave an impressive ______ on climate change that moved the entire audience.",["presentation","message","relationship","failure"],0,null,"presentation (n.) 報告；介紹。present + -ation。"],
[11,"MC","She felt deeply ______ when none of her friends showed up at her birthday party.",["disappointed","satisfying","romantic","inspired"],0,null,"disappointed (adj.) 感到失望的。dis-（相反）+ appointed（期待的）。"],
[12,"MC","Please ______ to my email as soon as possible — the deadline is tomorrow morning.",["respond","ignore","deny","refresh"],0,null,"respond (vi.) 回應。re-（回）+ spond（承諾）→ 回應。"],
[13,"MC","He tried to ______ the embarrassing incident, but people kept bringing it up.",["ignore","deny","respond","focus"],0,null,"ignore (vt.) 忽略。ig-（不）+ nore（知道）→ 假裝不知道。"],
[14,"MC","The passionate music teacher ______ her to compose her very first song at age ten.",["inspired","ignored","denied","refreshed"],0,null,"inspire (vt.) 激勵；激發靈感。in-（向內）+ spir（呼吸）→ 向內吹入生命力。"],
[15,"MC","Despite all the noise around her, she stayed completely ______ on finishing her essay.",["focused","denied","refreshed","connected"],0,null,"focus (vi./vt.) 專注。stay focused on = 持續專注於。"],
[16,"MC","The rescue team used GPS technology to ______ the survivors in the dense jungle.",["locate","detect","predict","expose"],0,null,"locate (vt.) 找到……的位置。locus（地點）→ 找到位置。"],
[17,"MC","Dogs have a ______ sense of smell that allows them to ______ illness before symptoms appear.",["keen / detect","visible / locate","alert / expose","complete / assign"],0,null,"keen (adj.) 敏銳的；detect (vt.) 偵測到。兩者經常連用。"],
[18,"MC","After months of dedicated practice, she finally ______ her goal of finishing the marathon.",["accomplished","assigned","exposed","detected"],0,null,"accomplish (vt.) 達成；完成任務。ac-（趨向）+ complish（完成）。"],
[19,"MC","The professor ______ each student a different topic to research for the group project.",["assigned","exposed","managed","predicted"],0,null,"assign (vt.) 指派；分配。as-（趨向）+ sign（標記）→ 指定到某處。"],
[20,"MC","Scientists use complex models to ______ the future spread of new infectious diseases.",["predict","detect","locate","expose"],0,null,"predict (vt.) 預測。pre-（之前）+ dict（說）→ 在事情發生前說出來。"]
],
B:[
[1,"FILL","Unlike the small minority who strongly opposed the new bill, the m______y of citizens were firmly in favor of passing it into law.","majority",null,"m_______y|the larger portion; opposite of minority","📖 不同於少數強烈反對新法案的人，大多數公民堅定地支持將其通過成為法律。\nmajority (n.) 大部分；多數。major（大）+ -ity → 規模最大的那一群。注意：the majority of + N + 複數動詞。"],
[2,"FILL","Given her consistent track record of excellence, it is highly p______e that she will be selected for the national team next year.","probable",null,"p______e|likely; opposite of impossible or improbable","📖 鑑於她一貫優異的表現，她極有可能在明年被選入國家隊。\nprobable (adj.) 很可能的。prob-（可以被證明的）→ it is probable that...。"],
[3,"FILL","Although she loved her new life in Canada, she often felt h______k and missed the familiar smell of her mother's cooking.","homesick",null,"h______k|missing home; longing for familiar places and people","📖 儘管她喜歡在加拿大的新生活，她仍常常思鄉，懷念媽媽烹飪熟悉的香氣。\nhomesick (adj.) 思鄉的。home + sick → 對家鄉的渴望如同病痛。"],
[4,"FILL","Unable to complete the ambitious project alone, the startup decided to h__e three experienced developers from abroad.","hire",null,"h__e|to employ; to take someone on for pay","📖 無法獨自完成這個雄心勃勃的專案，這家新創公司決定從國外聘請三名有經驗的開發人員。\nhire (vt.) 僱用。hire sb. to do sth. = 僱用某人做某事。"],
[5,"FILL","Before launching the product, the team needed to d_______e exactly which age group would benefit most from using it.","determine",null,"d_______e|to find out for certain; to establish exactly","📖 在推出產品之前，團隊需要確切確定哪個年齡層能從中獲益最多。\ndetermine (vt.) 確定；決定。de-（完全）+ termin（界限）→ 把界限確定下來。"],
[6,"FILL","The moment she walked into the café, she r________d the stranger's face from a missing person flyer she had seen weeks earlier.","recognized",null,"r________d|to identify someone seen before; to know again","📖 她一走進咖啡廳，就從幾週前看過的失蹤人口傳單上認出了那個陌生人的臉。\nrecognize (vt.) 認出。re-（再次）+ cognize（知道）→ 再次確認知道。"],
[7,"FILL","In contrast to the stressful exam weeks, the weekend hiking trip turned out to be the most e_______e experience of the entire semester.","enjoyable",null,"e_______e|pleasant; bringing joy; worth experiencing","📖 與緊張的考試週相比，週末的登山之旅成為整個學期最令人愉快的經歷。\nenjoyable (adj.) 愉快的。enjoy + -able → 能夠被享受的。"],
[8,"FILL","While most crystals share common shapes, each snowflake has a completely u____e pattern that cannot be found anywhere else in nature.","unique",null,"u____e|one of a kind; unlike anything else in existence","📖 雖然大多數晶體形狀相似，但每片雪花都有完全獨特的圖案，在自然界中找不到相同的。\nunique (adj.) 獨特的；獨一無二的。uni-（一）→ 只有一個的。"],
[9,"FILL","Despite the enormous pressure from the crowd and the media, the young athlete r______d surprisingly calm and focused throughout the entire final.","remained",null,"r______d|stayed; continued to be in the same condition","📖 儘管來自觀眾和媒體的巨大壓力，這位年輕運動員在整個決賽中出乎意料地保持冷靜專注。\nremain (vi.) 仍是；繼續。remain + adj. = 仍然保持某狀態。"],
[10,"FILL","Rather than announcing the party on social media, he chose to send a personal i________n to each of his closest friends.","invitation",null,"i________n|a card or letter asking someone to come; a formal request to attend","📖 他沒有在社群媒體上宣布派對，而是選擇親自寄給每位最親近朋友一張邀請函。\ninvitation (n.) 邀請；請帖。invite + -ation → 邀請的行為/結果。"],
[11,"FILL","Unlike the general public, only staff members with valid ID badges are p_______d to enter the restricted laboratory after 10 p.m.","permitted",null,"p_______d|allowed officially; given formal consent to do something","📖 不同於一般大眾，只有持有效識別證的工作人員才被允許在晚上十點後進入限制區實驗室。\npermit (vt.) 允許。be permitted to do = 被允許做…（正式用法）。"],
[12,"FILL","Instead of applying paint with a brush, the artist used a bold scraping t_______e to create a rough, dramatic texture on the canvas.","technique",null,"t_______e|a specific skill or method; the how-to of doing something","📖 這位藝術家不用畫筆塗抹，而是使用大膽的刮畫技法，在畫布上創造出粗獷、戲劇性的質感。\ntechnique (n.) 技巧；手法。tech-（技術）→ 特定的操作方法。"],
[13,"FILL","While many people panic under pressure, her greatest s______h is the ability to stay completely composed when everyone else is falling apart.","strength",null,"s______h|a strong quality; what someone is best at; opposite of weakness","📖 許多人在壓力下會慌亂，但她最大的優點是當所有人都崩潰時，仍能保持完全的冷靜。\nstrength (n.) 力量；優點。strong → strength（名詞）。greatest strength = 最大的優勢。"],
[14,"FILL","Unlike the fixed price of electricity, the cost of fresh produce v____s widely from season to season and from market to market.","varies",null,"v____s|differs; changes depending on conditions; is not fixed","📖 不像電費是固定的，新鮮農產品的價格因季節和市場的不同而差異很大。\nvary (vi.) 變化；不同。varies depending on = 視…而異（第三人稱單數現在式）。"],
[15,"FILL","Unlike the usual week-long approval process, the emergency aid required an i_______e response — the funds had to be released within hours.","immediate",null,"i_______e|right away; without any delay; opposite of gradual","📖 不像通常需要一週的審批程序，緊急援助需要立即回應——資金必須在幾小時內撥出。\nimmediate (adj.) 立即的。im-（否定）+ medi（中間）→ 沒有中間等待 → 立刻的。"],
[16,"FILL","Although she was visibly nervous backstage, the moment she stepped into the spotlight she p_______d with such confidence that no one could tell.","performed",null,"p_______d|carried out on stage or in public; gave a show","📖 儘管她在後台明顯緊張，但一踏入聚光燈下，她就以如此自信的姿態演出，讓人完全看不出來。\nperform (vt.) 表演；執行。per-（完全）+ form → 完整呈現。"],
[17,"FILL","Rather than complaining about the harsh feedback, she took it as a chance to grow — her positive a______e toward criticism set her apart from her peers.","attitude",null,"a______e|one's outlook or mindset; how someone feels toward something","📖 她非但沒有抱怨嚴苛的回饋，反而把它當作成長機會——她對批評的積極態度讓她與同儕截然不同。\nattitude (n.) 態度。attitude toward/to = 對…的態度，固定搭配。"],

[19,"ROOT","\"Mis-\" in misunderstand and mislead means ______.",["wrongly","not enough","too much","again"],0,null,"mis- = 錯誤地。misunderstand = 理解錯誤；mislead = 帶到錯誤方向；mistake = 拿錯 → 犯錯。"],

[10,"MC","She ______ the interview panel with her knowledge, confidence, and clear communication skills.",["impressed","bored","frightened","confused"],0,null,"impress (vt.) 使留下深刻印象。impress sb. with sth. = 以某事使某人印象深刻。"],
[11,"MC","The documentary ______ a rarely seen side of life in remote mountain villages.",["revealed","created","imagined","avoided"],0,null,"reveal (vt.) 揭露；呈現。reveal a side of... = 呈現…的一面。"],

[14,"MC","She worked hard to ______ a positive relationship with her new colleagues from day one.",["build","break","ignore","replace"],0,null,"build a relationship（建立關係）是固定搭配。build = 逐步建立。"],

[16,"MC","He showed great ______ by staying calm and making decisions under extreme pressure.",["composure","panic","confusion","hesitation"],0,null,"composure (n.) 冷靜；鎮定。composure under pressure = 壓力下的沉著。"],

[18,"MC","The teacher asked students to ______ their essays before submitting them to check for errors.",["proofread","write","translate","submit"],0,null,"proofread (vt.) 校對；修改錯誤。proofread an essay = 校對文章。"],

B:[
[1,"FILL","While the majority of delegates voted in favor, a small but vocal m_______y continued to oppose the resolution until the very end.","minority",null,"m_______y|the smaller group; opposite of majority","📖 雖然大多數代表投票贊成，但一個人數少卻聲音響亮的少數派一直反對決議到最後。\nminority (n.) 少數（派）。min-（小）+ -ority → 規模較小的那一群。與 majority 形成對比。"],
[2,"FILL","Rather than accepting the situation passively, she decided to take the i_________e and suggest a completely new approach.","initiative",null,"i_________e|the act of taking the first move; doing something without being told","📖 她沒有被動接受現況，而是決定主動出擊，提出一個全新的方式。\ninitiative (n.) 主動；倡議。take the initiative = 主動採取行動，固定搭配。"],
[3,"FILL","Though the critics gave mixed reviews, the director remained c_______d that the film would resonate with audiences worldwide.","convinced",null,"c_______d|certain; fully persuaded; having no remaining doubt","📖 儘管評論褒貶不一，導演仍然深信這部電影會引起全球觀眾的共鳴。\nconvince (vt.) 說服；使確信。be convinced that... = 確信…。"],
[4,"FILL","Unlike most people who fear public speaking, she found it e________g and looked forward to every chance to present.","exhilarating",null,"e________g|thrilling; producing a rush of excitement; the opposite of dull or tedious","📖 不同於大多數害怕公開演說的人，她覺得這令人振奮，並期待每一次上台的機會。\nexhilarating (adj.) 令人振奮的；令人興奮的。exhilarate（使振奮）+ -ing → 主動引起振奮感的。"],
[5,"FILL","She was unable to c_______t her emotions when she heard the news — tears streamed down her face immediately.","control",null,"c_______t|to keep in check; to manage or hold back something","📖 當她聽到這個消息時，她無法控制情緒，淚水立刻奪眶而出。\ncontrol (vt.) 控制。control one's emotions = 控制情緒，固定搭配。"],
[6,"FILL","Instead of rushing into a decision, he took time to c_______r all the possible outcomes before choosing.","consider",null,"c_______r|to think carefully about; to weigh options before deciding","📖 他沒有倉促做決定，而是花時間考量所有可能的結果後再做選擇。\nconsider (vt.) 考慮；思量。consider all options = 考慮所有選項。"],
[7,"FILL","Despite the freezing temperature, the volunteers showed up without h_______n and worked through the night.","hesitation",null,"h_______n|a pause caused by uncertainty; the state of not acting right away; without _____ = boldly","📖 儘管氣溫極低，志工們毫不猶豫地出現，並徹夜工作。\nhesitation (n.) 猶豫。without hesitation = 毫不猶豫，固定搭配。"],
[8,"FILL","Not only was the speaker k_________ble, but she also had the rare ability to explain complex ideas in simple terms.","knowledgeable",null,"k_________e|well-informed; having a broad base of facts and understanding","📖 這位演講者不僅學識淵博，還有將複雜概念以簡單方式解釋的罕見能力。\nknowledgeable (adj.) 知識豐富的。knowledge + -able → 擁有豐富知識的。"],
[9,"FILL","While most students found the assignment o_______g, she found it to be a great chance to express herself creatively.","overwhelming",null,"o_______g|too much to handle; crushing in scale or intensity","📖 大多數學生覺得這份作業壓倒性地困難，她卻把它視為創意表達的大好機會。\noverwhelming (adj.) 壓倒性的；使人不知所措的。over-（超過）+ whelm（淹沒）→ 完全淹沒的。"],
[10,"FILL","In contrast to her f_______e colleagues who always met deadlines, she consistently handed in work late.","diligent",null,"d_______t|hardworking; consistently putting in steady effort; opposite of lazy","📖 與她那些總是準時完成的勤奮同事相比，她總是遲交作業。\ndiligent (adj.) 勤奮的；認真的。diligent colleague = 勤奮的同事，與「總是遲交」形成對比。"],
[11,"FILL","Rather than blaming others for the failure, she took full r___________y for what went wrong.","responsibility",null,"r___________y|the duty or obligation to answer for one's actions","📖 她沒有把失敗歸咎於他人，而是為所有出錯的事承擔了全部責任。\nresponsibility (n.) 責任。take responsibility for = 為…承擔責任，固定搭配。"],
[12,"FILL","Without a proper s_______y, the hikers had no way to know how much further they had to walk.","strategy",null,"s_______y|a plan or method designed to achieve a goal","📖 沒有適當的策略，登山者無法知道還要走多遠。\nstrategy (n.) 策略；計畫。without a strategy = 沒有策略。"],
[13,"FILL","Although her first a_______t at cooking the dish failed, she tried again three times before getting it right.","attempt",null,"a_______t|a try; an effort to do something, especially something difficult","📖 儘管她第一次嘗試烹飪這道菜失敗了，她又嘗試了三次才做對。\nattempt (n.) 嘗試。make an attempt = 進行嘗試；at one's first attempt = 第一次嘗試時。"],
[14,"FILL","Despite the long hours and difficult conditions, the rescue team never lost their d_________n to find the missing child.","determination",null,"d_________n|firm resolve; the will to keep going no matter what; opposite of giving up","📖 儘管工時長且條件艱苦，救援隊從未失去找到失蹤孩童的決心。\ndetermination (n.) 決心。determine → determination。never lose one's determination = 從不失去決心。"],
[15,"FILL","Rather than copying others, she always tried to bring something o_______l to her designs.","original",null,"o_______l|fresh; not copied from anything else; coming from one's own creativity","📖 她從不模仿他人，總是努力在設計中帶入一些原創的東西。\noriginal (adj.) 原創的；獨特的。origin（起源）+ -al → 來自源頭的、非模仿的。"],
[16,"FILL","The p_______n of wild animals in the region has dropped significantly due to habitat loss.","population",null,"p_______n|the total number of people or animals in a given area","📖 由於棲息地喪失，該地區野生動物的數量已顯著下降。\npopulation (n.) 數量；人口（此處指動物數量）。the population of = …的數量/人口。"],
[17,"FILL","Although the film received mixed reviews, its e_______l impact on audiences was undeniable.","emotional",null,"e_______l|relating to feelings; touching the heart; opposite of purely rational","📖 儘管這部電影評價不一，它對觀眾的情感衝擊是無可否認的。\nemotional (adj.) 情感的；情緒的。emotion + -al → 與情感相關的。"],
[18,"FILL","In contrast to traditional classroom learning, e_________e learning allows students to study anywhere and anytime.","e-learning",null,"e-_______g|online study; learning through digital platforms rather than a classroom","📖 與傳統課堂學習相比，線上學習讓學生能隨時隨地學習。\ne-learning (n.) 線上學習；電子學習。e- = electronic（電子的）的縮寫。"],
[19,"FILL","She was s_______d to learn that her proposal had been selected out of more than two hundred submissions.","surprised",null,"s_______d|caught off guard; reacting to something unexpected","📖 得知她的提案從超過兩百份投稿中被選中，她感到非常驚訝。\nsurprised (adj.) 驚訝的。be surprised to + V = 對…感到驚訝。"],
[20,"FILL","Without the t_____r's guidance, many students would have struggled to understand the difficult concepts.","tutor",null,"t_____r|a private teacher; someone who gives one-on-one lessons","📖 沒有家教的指導，許多學生將很難理解這些困難的概念。\ntutor (n.) 家教；導師。a tutor's guidance = 家教的指導。"]

[1,"ROOT","The word \"displacement\" contains the prefix \"dis-\" which most likely means ______.",["away / apart","not enough","again","between"],0,null,"dis- = 分離、離開。displacement = 被迫離開原來的地方。其他含 dis- 的字：dismiss、disturb、displace。"],
[2,"ROOT","\"Flex\" in flexible and reflect both relate to the idea of ______.",["bending","speaking","writing","feeling"],0,null,"flex/flect = 彎曲（拉丁語 flectere）。flexible = 能彎曲的；reflect = 把光/思緒折回。"],
[3,"ROOT","The suffix \"-tion/-ation\" in restoration, establishment, and determination all form ______.",["nouns from verbs","adjectives from nouns","adverbs from adjectives","verbs from nouns"],0,null,"-tion/-ation 是最常見的名詞後綴。restore → restoration；establish → establishment；determine → determination。"],
[4,"ROOT","Which word contains a root meaning \"to stand\"?",["outstanding","understanding","withstanding","all of the above"],3,null,"stand 本身即含有「站立」意義。outstanding = 站出來超越；understanding = 站在下方支撐（理解）；withstanding = 站著承受。"],
[5,"ROOT","The prefix \"over-\" in overwhelming and overcome suggests ______.",["above / beyond / too much","under / below","without","before"],0,null,"over- = 超過、在上方。overwhelming = 超過承受能力；overcome = 越過障礙 → 克服。"],
[6,"CTX","The manager asked her team to ______ their progress report before the Monday morning meeting.",["prepare","ignore","cancel","postpone"],0,null,"prepare（準備）最符合「週一早上開會前」需要完成報告的語境。postpone 表延後，方向相反。"],
[7,"CTX","He was ______ when his best friend forgot his birthday — he had been reminding him all week.",["hurt","relieved","amused","satisfied"],0,null,"hurt（受傷；難過）符合「提醒了一整週卻仍被遺忘」的情境。"],
[8,"CTX","The company's ______ to customer feedback helped it avoid a major product recall.",["response","indifference","delay","refusal"],0,null,"response（回應）搭配「對客戶回饋」，才能避免大規模召回。indifference / delay 則會導致問題惡化。"],
[9,"CTX","She felt a deep sense of ______ after submitting the final chapter of her novel.",["accomplishment","disappointment","frustration","regret"],0,null,"accomplishment（成就感）搭配「終於交出小說最終章」這個正面成果。"],
[10,"CTX","The audience was ______ by the magician's final trick — no one could figure out how he did it.",["astonished","bored","annoyed","confused"],0,null,"astonished（極度驚訝的）最符合「沒有人能搞清楚他怎麼做到的」這種震撼語境。"],
[11,"ROOT","\"Port\" in transport and export means ______.",["carry","find","build","sell"],0,null,"port = 攜帶（拉丁語 portare）。transport = 運送（橫越攜帶）；export = 向外攜帶；import = 向內攜帶。"],
[12,"ROOT","The root \"struct\" in construction and instruction means ______.",["build","destroy","write","move"],0,null,"struct = 建造（拉丁語 struere）。construction = 建造；instruction = 將知識建入 → 指導；destruction = 拆除（de- = 相反）。"],
[13,"ROOT","Which word uses \"sub-\" to mean \"under\" or \"below\"?",["submarine","substitute","suburb","all of the above"],3,null,"sub- = 在下方。submarine = 海中之下（水下）；substitute = 站在下方替代；suburb = 城市下方的周邊地帶。"],
[14,"CTX","The new library was designed to be both ______ and welcoming — every shelf was within easy reach.",["accessible","restricted","remote","exclusive"],0,null,"accessible（易於進入/使用的）符合「每個書架都在伸手可及範圍」的設計描述。"],
[15,"CTX","She ______ her résumé to highlight her most recent experience before applying for the new position.",["updated","printed","submitted","deleted"],0,null,"updated（更新）符合「申請新職位前」需要突出最新經驗的語境。"],
[16,"ROOT","The prefix \"inter-\" in international and interact means ______.",["between / among","not","too much","after"],0,null,"inter- = 在…之間。international = 在國家之間；interact = 在彼此之間行動（互動）；internet = 在網路之間。"],
[17,"CTX","Her ______ explanation of the theory made it easy for even beginners to understand.",["simplified","complicated","lengthy","technical"],0,null,"simplified（簡化的）才能解釋「即使初學者也能理解」的結果。complicated / technical 為反義。"],
[18,"CTX","Without ______ support from the local government, the festival would not have been possible.",["financial","emotional","minimal","occasional"],0,null,"financial support（財政支持）最符合「讓活動得以舉辦」的條件，且搭配「地方政府」語境。"],
[19,"ROOT","\"Vis/vid\" in visible and evidence means ______.",["see","speak","move","know"],0,null,"vis/vid = 看見（拉丁語 videre）。visible = 能被看見的；evidence = 被看見的事物 → 證據；vision = 視力/視野。"],
[20,"CTX","The two countries agreed to ______ a trade agreement that would benefit both economies.",["establish","cancel","ignore","delay"],0,null,"establish（建立）搭配「貿易協議」，符合「雙方同意」的正面語境。cancel / delay 為反義。"]
]},

// ENGINE
// ══════════════════════════════════════════════════════════════════════
let curW='w1', curTier='low';
let state={};
const ALPHA=['A','B','C','D'];

function initState(wk){
  if(!state[wk]) state[wk]={A:{},B:{},C:{}};
}
function getQs(wk,tier){
  const d=QDB[wk];
  if(tier==='low') return [{part:'A',qs:d.A}];
  if(tier==='mid') return [{part:'A',qs:d.A},{part:'B',qs:d.B}];
  return [{part:'A',qs:d.A},{part:'B',qs:d.B},{part:'C',qs:d.C}];
}
function setTier(t,el){
  curTier=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function switchWeek(wk){
  curW=wk;
  document.querySelectorAll('.wt').forEach(b=>b.classList.remove('active'));
  document.getElementById('wt_'+wk).classList.add('active');
  render();
}

function render(){
  initState(curW);
  const d=QDB[curW];
  document.getElementById('winfo').innerHTML=
    `<span class="wl">第 ${d.week} 週　${d.dates}</span>`+
    `<span class="ws">Part A：${d.srcA}</span>`+
    `<span class="ws">Part B：${d.srcB}</span>`+
    `<span class="ws">Part C：${d.srcC}</span>`;
  const groups=getQs(curW,curTier);
  const partLabel={A:'Part A　選擇題（Vocabulary in Context）',B:'Part B　填空題（Guided Fill-in）',C:'Part C　進階題（Word Formation & Context）'};
  let html='';
  groups.forEach(g=>{
    html+=`<div class="ph ${g.part}">📝 ${partLabel[g.part]}</div>`;
    g.qs.forEach((q,i)=>{
      const qid=`${curW}_${g.part}_${i}`;
      const st=state[curW][g.part][i]||{done:false,correct:false};
      const cls=st.done?(st.correct?'correct':'wrong'):'';
      const [id,type,stem,opts,ans,hint,expl]=q;
      const stemHtml = stem.replace(/\n/g,'<br>');
      if(type==='MC'||type==='ROOT'||type==='CTX'){
        const btns=opts.map((o,oi)=>{
          let bcls='ob';
          if(st.done){
            if(oi===ans) bcls+=' correct';
            else if(oi===st.chosen) bcls+=' wrong';
          }
          return `<button class="${bcls}" onclick="answerMC('${curW}','${g.part}',${i},${oi},${ans},'${qid}')" ${st.done?'disabled':''}><span class="ol">${ALPHA[oi]}.</span>${o}</button>`;
        }).join('');
        const expHtml=st.done?`<div class="exp show"><span class="exl">解析</span>${expl}</div>`:`<div class="exp"></div>`;
        html+=`<div class="qc ${cls}" id="${qid}">
          <div class="qh"><div class="qn">${i+1}</div><div class="qt">${stemHtml}</div><span class="qtag ${type}">${type}</span></div>
          <div class="opts">${btns}</div>${expHtml}</div>`;
      } else {
        const val=st.done?(st.correct?ans:(st.typed||'')):'';
        const fiCls=st.done?(st.correct?'correct':'wrong'):'';
        const expHtml=st.done?`<div class="exp show"><span class="exl">解析</span>${expl}</div>`:`<div class="exp"></div>`;
        const wrongAns=st.done&&!st.correct?`<div class="fh">✅ 正確答案：${ans}</div>`:'';
        let hintHtml='';
        if(hint){
          const hParts=hint.split('|');
          const hBlank=hParts[0];
          const hText=hParts.slice(1).join('|');
          hintHtml=`<div class="hint-box"><span class="hint-blank">${hBlank}</span><span class="hint-sep"> — </span><span class="hint-text">${hText}</span></div>`;
        }
        html+=`<div class="qc ${cls}" id="${qid}">
          <div class="qh"><div class="qn">${i+1}</div><div class="qt">${stemHtml}</div><span class="qtag FILL">FILL</span></div>
          ${hintHtml}
          <div class="fr">
            <input class="fi ${fiCls}" id="fi_${qid}" placeholder="輸入答案…" value="${val}" ${st.done?'disabled':''}
              onkeydown="if(event.key==='Enter')checkFill('${curW}','${g.part}',${i},'${qid}')">
            <button class="ck" id="ck_${qid}" onclick="checkFill('${curW}','${g.part}',${i},'${qid}')" ${st.done?'disabled':''}>確認</button>
          </div>${wrongAns}${expHtml}</div>`;
      }
    });
  });
  document.getElementById('qa').innerHTML=html;
  updateScore();
}

function answerMC(wk,part,idx,chosen,ans,qid){
  state[wk][part][idx]={done:true,correct:chosen===ans,chosen};
  render();
  setTimeout(()=>document.getElementById(qid)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function checkFill(wk,part,idx,qid){
  const inp=document.getElementById('fi_'+qid);
  if(!inp) return;
  const typed=inp.value.trim().toLowerCase();
  const ans=QDB[wk][part][idx][3].toLowerCase();
  state[wk][part][idx]={done:true,correct:typed===ans,typed:inp.value.trim()};
  render();
  setTimeout(()=>document.getElementById(qid)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function updateScore(){
  const groups=getQs(curW,curTier);
  let tot=0,cor=0,ans=0;
  groups.forEach(g=>{
    g.qs.forEach((_,i)=>{
      tot++;
      const s=state[curW]?.[g.part]?.[i];
      if(s?.done){ans++; if(s.correct) cor++;}
    });
  });
  document.getElementById('sn').textContent=`${cor} / ${ans}`;
  document.getElementById('pf').style.width=tot>0?`${ans/tot*100}%`:'0%';
  const allDone=ans===tot;
  if(allDone) document.getElementById('wt_'+curW)?.classList.add('done');
}

function showResult(){
  const groups=getQs(curW,curTier);
  let tot=0,cor=0;
  groups.forEach(g=>{ g.qs.forEach((_,i)=>{ tot++; const s=state[curW]?.[g.part]?.[i]; if(s?.correct) cor++; }); });
  const pct=tot>0?Math.round(cor/tot*100):0;
  document.getElementById('msc').textContent=`${pct}%`;
  const msgs=[
    [90,'🏆 表現優異！繼續保持，下週更上一層樓！'],
    [70,'💪 不錯的成績！再檢視錯題，可以更進步。'],
    [50,'📚 繼續加油！建議重新複習本週字彙。'],
    [0,'🔁 別氣餒！多讀幾遍課文，重新挑戰！']
  ];
  document.getElementById('mmsg').textContent=msgs.find(([t])=>pct>=t)[1];
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function retryWrong(){
  closeModal();
  const groups=getQs(curW,curTier);
  groups.forEach(g=>{ g.qs.forEach((_,i)=>{ const s=state[curW]?.[g.part]?.[i]; if(s&&!s.correct) state[curW][g.part][i]={done:false}; }); });
  render();
}

// Build week tabs
(function(){
  const tabs=document.getElementById('wkTabs');
  for(let w=1;w<=8;w++){
    const id='w'+w;
    const btn=document.createElement('button');
    btn.className='wt'+(w===1?' active':'');
    btn.id='wt_'+id;
    btn.textContent='W'+w;
    btn.onclick=()=>switchWeek(id);
    tabs.appendChild(btn);
  }
})();
render();
</script>
